<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=2.0">

<title>남양주시 문화의집</title>

<style>
body {
  font-family: 'Pretendard', sans-serif;
  background:#f2f4f6;
  margin:0;
}

.header{
  background:#3182f6;
  color:white;
  text-align:center;
  padding:20px;
  font-size:24px;
  font-weight:bold;
}

.container{
  max-width:600px;
  margin:auto;
  padding:20px;
}

.card{
  background:white;
  padding:25px;
  border-radius:20px;
  margin-top:20px;
  box-shadow:0 8px 20px rgba(0,0,0,0.05);
}

.btn{
  width:100%;
  padding:20px;
  margin-top:12px;
  border:none;
  border-radius:15px;
  font-size:20px;
  cursor:pointer;
}

.primary{background:#3182f6;color:white;}
.danger{background:#ff4d4f;color:white;}

input,select{
  width:100%;
  padding:15px;
  margin-top:10px;
  border-radius:10px;
  border:1px solid #ddd;
  font-size:16px;
}

.hidden{display:none;}
</style>
</head>

<body>

<div class="header">남양주시 문화의집</div>

<div class="container">

<!-- 홈 -->
<div id="home" class="card">
  <button class="btn primary" onclick="go('attendance')">동아리 출석체크</button>
  <button class="btn primary" onclick="go('booking')">대관 신청</button>
  <button class="btn primary" onclick="go('external')">외부활동 공유</button>
  <button class="btn primary" onclick="go('calendar')">캘린더</button>
</div>

<!-- 출석 -->
<div id="attendance" class="card hidden">
  <h3>요일 선택</h3>
  <div id="days"></div>

  <h3>동아리</h3>
  <div id="clubs"></div>

  <h3>이름</h3>
  <div id="members"></div>

  <button class="btn primary" onclick="submitAttendance()">출석 제출</button>
  <button class="btn danger" onclick="go('home')">뒤로가기</button>
</div>

<!-- 대관 -->
<div id="booking" class="card hidden">
  <h3>대관 신청</h3>
  <input id="b_name" placeholder="이름">
  <input id="b_phone" placeholder="전화번호">
  <input id="b_space" placeholder="공간">
  <input id="b_content" placeholder="내용">
  <input id="b_date" type="datetime-local">
  <select id="b_hours">
    <option value="1">1시간</option>
    <option value="2">2시간</option>
    <option value="3">3시간</option>
    <option value="4">4시간</option>
  </select>

  <button class="btn primary" onclick="submitBooking()">신청</button>
  <button class="btn danger" onclick="go('home')">뒤로가기</button>
</div>

<!-- 외부활동 -->
<div id="external" class="card hidden">
  <h3>외부활동 공유</h3>
  <input id="e_club" placeholder="동아리명">
  <input id="e_phone" placeholder="전화번호">
  <input id="e_event" placeholder="행사명">
  <input id="e_content" placeholder="내용">
  <input id="e_date" type="datetime-local">

  <button class="btn primary" onclick="submitExternal()">등록</button>
  <button class="btn danger" onclick="go('home')">뒤로가기</button>
</div>

<!-- 캘린더 -->
<div id="calendar" class="card hidden">
  <iframe 
    src="https://calendar.google.com/calendar/embed?src=nyjculturalhouse%40gmail.com&ctz=Asia%2FSeoul"
    style="width:100%; height:80vh; border:0;">
  </iframe>

  <button class="btn danger" onclick="go('home')">뒤로가기</button>
</div>

</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbyO4MEH9YOoEgNoeWmfMwuWKiFTbBhcXAbFYub3ktusOmZxe1kng0hlFpKNmWrMV-wRvw/exec";

let selectedDay='', selectedClub='', selectedMembers=[];

function go(id){
  document.querySelectorAll('.card').forEach(c=>c.classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');

  if(id==="attendance") loadDays();
}

function loadDays(){
  const days=['화','수','목','금','토','일'];
  const el=document.getElementById('days');
  el.innerHTML='';

  days.forEach(d=>{
    const b=document.createElement('button');
    b.className='btn';
    b.innerText=d+'요일';
    b.onclick=()=>loadClubs(d);
    el.appendChild(b);
  });
}

function loadClubs(day){
  selectedDay=day;
  fetch(API+"?type=getClubs&day="+day)
    .then(r=>r.json())
    .then(data=>{
      const el=document.getElementById('clubs');
      el.innerHTML='';
      data.forEach(c=>{
        const b=document.createElement('button');
        b.className='btn';
        b.innerText=c;
        b.onclick=()=>loadMembers(c);
        el.appendChild(b);
      });
    });
}

function loadMembers(club){
  selectedClub=club;
  selectedMembers=[];
  fetch(API+"?type=getMembers&club="+encodeURIComponent(club))
    .then(r=>r.json())
    .then(data=>{
      const el=document.getElementById('members');
      el.innerHTML='';
      data.forEach(m=>{
        const b=document.createElement('button');
        b.className='btn';
        b.innerText=m;
        b.onclick=()=>{
          b.classList.toggle('primary');
          const i=selectedMembers.indexOf(m);
          i>-1?selectedMembers.splice(i,1):selectedMembers.push(m);
        };
        el.appendChild(b);
      });
    });
}

function submitAttendance(){
  fetch(API,{
    method:"POST",
    body:JSON.stringify({
      type:"attendance",
      club:selectedClub,
      members:selectedMembers,
      day:selectedDay
    })
  }).then(()=>alert("출석 완료"));
}

function submitBooking(){
  fetch(API,{
    method:"POST",
    body:JSON.stringify({
      type:"booking",
      name:b_name.value,
      phone:b_phone.value,
      space:b_space.value,
      content:b_content.value,
      dateTime:b_date.value,
      hours:b_hours.value
    })
  }).then(()=>alert("신청 완료"));
}

function submitExternal(){
  fetch(API,{
    method:"POST",
    body:JSON.stringify({
      type:"external",
      club:e_club.value,
      phone:e_phone.value,
      event:e_event.value,
      content:e_content.value,
      dateTime:e_date.value
    })
  }).then(()=>alert("등록 완료"));
}
</script>

</body>
</html>
