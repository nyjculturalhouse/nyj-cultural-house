<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {font-family:'Noto Sans KR'; background:#f2f4f6; margin:0;}
.container {padding:20px; max-width:600px; margin:auto;}
.card {background:#fff; padding:20px; border-radius:16px; margin-top:15px;}
.btn {width:100%; padding:15px; margin-top:10px; font-size:16px; border:0; border-radius:10px;}
.hidden {display:none;}
.selected {background:#3182f6; color:#fff;}
input {width:100%; padding:12px; margin-top:10px; box-sizing:border-box;}
.small {font-size:13px; color:#666;}
</style>
</head>

<body>
<div class="container">

<h2>남양주시 문화의집</h2>

<!-- 홈 -->
<div id="home" class="card">
  <button class="btn" onclick="go('attendance')">출석체크</button>
  <button class="btn" onclick="go('reservation')">대관 신청</button>
  <button class="btn" onclick="go('external')">외부 일정 공유</button>
  <button class="btn" onclick="go('calendar')">캘린더</button>
</div>

<!-- 출석 -->
<div id="attendance" class="card hidden">
  <h3>출석체크</h3>

  <div id="status" class="small"></div>
  <div id="days"></div>
  <div id="clubs"></div>
  <div id="members"></div>

  <button class="btn" onclick="submitAttendance()">출석 저장</button>
  <button class="btn" onclick="go('home')">뒤로</button>
</div>

<!-- 대관 -->
<div id="reservation" class="card hidden">
  <h3>대관 신청</h3>

  <input id="r-name" placeholder="이름">
  <input id="r-phone" placeholder="연락처">
  <input id="r-space" placeholder="공간">

  <!-- 🔥 30분 단위 -->
  <input id="r-date" type="datetime-local" step="1800">

  <input id="r-purpose" placeholder="목적">

  <button class="btn" onclick="submitReservation()">신청</button>
  <button class="btn" onclick="go('home')">뒤로</button>
</div>

<!-- 외부 일정 -->
<div id="external" class="card hidden">
  <h3>외부 일정 공유</h3>

  <input id="e-club" placeholder="동아리명">
  <input id="e-writer" placeholder="작성자">
  <input id="e-title" placeholder="제목">
  <input id="e-date" type="datetime-local">
  <input id="e-content" placeholder="내용">

  <button class="btn" onclick="submitExternal()">등록</button>
  <button class="btn" onclick="go('home')">뒤로</button>
</div>

<!-- 캘린더 -->
<div id="calendar" class="card hidden">
  <h3>캘린더</h3>

  <iframe 
    src="https://calendar.google.com/calendar/embed?src=nyjculturalhouse@gmail.com&ctz=Asia%2FSeoul?v=2"
    style="width:100%; height:500px; border:0;">
  </iframe>

  <button class="btn" onclick="go('home')">뒤로</button>
</div>

</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbyO4MEH9YOoEgNoeWmfMwuWKiFTbBhcXAbFYub3ktusOmZxe1kng0hlFpKNmWrMV-wRvw/exec";

/******** 상태 관리 ********/
let selectedDay = "";
let selectedClub = "";
let selectedMembers = [];

/******** 화면 이동 ********/
function go(id){
  document.querySelectorAll('.card').forEach(c=>c.classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');

  if(id==="attendance") loadDays();
}

/******** 상태 표시 ********/
function updateStatus(){
  document.getElementById("status").innerText =
    `선택 → ${selectedDay || "-"} / ${selectedClub || "-"} / 인원 ${selectedMembers.length}`;
}

/******** 요일 ********/
function loadDays(){
  const days=["화","수","목","금","토","일"];
  const el=document.getElementById("days");

  el.innerHTML="<p class='small'>1️⃣ 요일 선택</p>";

  days.forEach(d=>{
    const b=document.createElement("button");
    b.className="btn";
    b.innerText="📅 " + d + "요일";

    b.onclick=()=>{
      selectedDay = d;
      selectedClub = "";
      selectedMembers = [];
      loadClubs(d);
      updateStatus();
    };

    el.appendChild(b);
  });
}

/******** 동아리 ********/
function loadClubs(day){
  fetch(API_URL,{
    method:"POST",
    body:JSON.stringify({type:"getClubs", day:day})
  })
  .then(r=>r.json())
  .then(data=>{
    const el=document.getElementById("clubs");

    el.innerHTML="<p class='small'>2️⃣ 동아리 선택</p>";

    data.clubs.forEach(c=>{
      const b=document.createElement("button");
      b.className="btn";
      b.innerText="🏷 " + c;

      b.onclick=()=>{
        selectedClub = c;
        selectedMembers = [];
        loadMembers(c);
        updateStatus();
      };

      el.appendChild(b);
    });
  });
}

/******** 멤버 ********/
function loadMembers(club){
  fetch(API_URL,{
    method:"POST",
    body:JSON.stringify({type:"getMembers", club:club})
  })
  .then(r=>r.json())
  .then(data=>{
    const el=document.getElementById("members");

    el.innerHTML="<p class='small'>3️⃣ 이름 선택</p>";

    data.members.forEach(m=>{
      const b=document.createElement("button");
      b.className="btn";
      b.innerText="👤 " + m;

      b.onclick=function(){
        this.classList.toggle("selected");

        const i = selectedMembers.indexOf(m);
        if(i>-1) selectedMembers.splice(i,1);
        else selectedMembers.push(m);

        updateStatus();
      };

      el.appendChild(b);
    });
  });
}

/******** 출석 ********/
function submitAttendance(){

  if(!selectedClub){
    alert("동아리를 선택하세요");
    return;
  }

  fetch(API_URL,{
    method:"POST",
    body:JSON.stringify({
      type:"attendance",
      club:selectedClub,
      members:selectedMembers.join(",")
    })
  })
  .then(r=>r.json())
  .then(res=>{
    if(res.error) alert(res.error);
    else {
      alert("출석 완료");
      selectedDay = "";
      selectedClub = "";
      selectedMembers = [];
      updateStatus();
    }
  });
}

/******** 대관 (30분 제한) ********/
function submitReservation(){

  const dateInput = document.getElementById("r-date").value;

  if(!dateInput){
    alert("시간을 선택하세요");
    return;
  }

  const date = new Date(dateInput);
  const min = date.getMinutes();

  if(min % 30 !== 0){
    alert("30분 단위로만 예약 가능합니다 (00 / 30)");
    return;
  }

  fetch(API_URL,{
    method:"POST",
    body:JSON.stringify({
      type:"reservation",
      name:document.getElementById("r-name").value,
      phone:document.getElementById("r-phone").value,
      space:document.getElementById("r-space").value,
      date:dateInput,
      purpose:document.getElementById("r-purpose").value
    })
  })
  .then(r=>r.json())
  .then(res=>{
    if(res.error) alert(res.error);
    else alert("신청 완료");
  });
}

/******** 외부 일정 ********/
function submitExternal(){
  fetch(API_URL,{
    method:"POST",
    body:JSON.stringify({
      type:"external",
      club:document.getElementById("e-club").value,
      writer:document.getElementById("e-writer").value,
      title:document.getElementById("e-title").value,
      content:document.getElementById("e-content").value,
      date:document.getElementById("e-date").value
    })
  })
  .then(()=>alert("등록 완료"));
}
</script>

</body>
</html>
