<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { font-family: -apple-system; background: #f2f4f6; margin:0; }
.container { max-width:500px; margin:auto; padding:20px; }
.card { background:white; padding:25px; border-radius:20px; margin-bottom:20px; box-shadow:0 8px 20px rgba(0,0,0,0.05);}
.btn { width:100%; padding:18px; margin-top:10px; border:none; border-radius:14px; font-size:16px; cursor:pointer;}
.primary { background:#3182f6; color:white; }
.danger { background:#ff4d4f; color:white; }
.selected { background:#3182f6; color:white; }
.hidden { display:none; }
input, select { width:100%; padding:14px; margin-top:10px; border-radius:10px; border:1px solid #ddd;}
iframe { width:100%; height:500px; border:none; border-radius:12px;}

.toast {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%);
  background: #191f28;
  color: white;
  padding: 15px 25px;
  border-radius: 12px;
  opacity: 0;
  transition: 0.3s;
}
.toast.show { opacity: 1; }
</style>

</head>
<body>

<div class="container">

<!-- 홈 -->
<div id="view-home" class="card">
<h2 style="text-align:center;">문화의집 시스템</h2>
<button class="btn primary" onclick="showView('attendance')">출석체크</button>
<button class="btn primary" onclick="showView('booking')">대관 신청</button>
<button class="btn primary" onclick="showView('external')">외부활동</button>
<button class="btn primary" onclick="showView('calendar')">캘린더</button>
</div>

<!-- 출석 -->
<div id="view-attendance" class="card hidden">
<div id="step-days"></div>
<div id="step-clubs" class="hidden"></div>
<div id="step-members" class="hidden"></div>
<button class="btn danger" onclick="back()">뒤로</button>
</div>

<!-- 대관 -->
<div id="view-booking" class="card hidden">
<h3>대관 신청</h3>
<input id="b_name" placeholder="이름">
<input id="b_phone" placeholder="전화번호">
<input id="b_space" placeholder="장소">
<input id="b_content" placeholder="내용">
<input id="b_date" type="datetime-local">
<select id="b_hours">
<option value="1">1시간</option>
<option value="2">2시간</option>
<option value="3">3시간</option>
</select>
<button class="btn primary" onclick="sendBooking()">신청</button>
</div>

<!-- 외부 -->
<div id="view-external" class="card hidden">
<h3>외부활동</h3>
<input id="e_club" placeholder="동아리">
<input id="e_phone" placeholder="연락처">
<input id="e_event" placeholder="행사명">
<input id="e_content" placeholder="내용">
<input id="e_date" type="datetime-local">
<button class="btn primary" onclick="sendExternal()">등록</button>
</div>

<!-- 캘린더 -->
<div id="view-calendar" class="card hidden">
<iframe src="https://calendar.google.com/calendar/embed?src=nyjculturalhouse%40gmail.com&ctz=Asia%2FSeoul"></iframe>
</div>

</div>

<div id="toast" class="toast"></div>

<script>

const API = "https://script.google.com/macros/s/AKfycbzcvY-Kt5JMeeejmVd7IRrJEj5mdXzjWKqbex3BRUcIp-6xOlOfyK1DVSrYlbv5ZkCZ/exec";

let step=1, selDay='', selClub='', selMembers=[];

// 공통
function showToast(msg){
  const t=document.getElementById("toast");
  t.innerText=msg;
  t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),2000);
}

// 화면 전환
function showView(v){
  document.querySelectorAll('.card').forEach(c=>c.classList.add('hidden'));
  document.getElementById('view-'+v).classList.remove('hidden');
  if(v==='attendance') loadDays();
}

// step 전환
function showStep(n){
  step=n;
  ['step-days','step-clubs','step-members'].forEach(id=>{
    document.getElementById(id).classList.add('hidden');
  });
  document.getElementById(['step-days','step-clubs','step-members'][n-1]).classList.remove('hidden');
}

// ===== 출석 =====

function loadDays(){
  showStep(1);
  const box=document.getElementById('step-days');
  box.innerHTML='<h3>요일 선택</h3>';

  ['화요일','수요일','목요일','금요일','토요일','일요일'].forEach(d=>{
    const b=document.createElement('button');
    b.className='btn';
    b.innerText=d;
    b.onclick=()=>{ selDay=d; loadClubs(d); }
    box.appendChild(b);
  });
}

function loadClubs(day){
  showStep(2);
  const box=document.getElementById('step-clubs');
  box.innerHTML='불러오는중...';

  fetch(`${API}?mode=getClubs&day=${encodeURIComponent(day)}`)
  .then(r=>r.json())
  .then(data=>{
    box.innerHTML='<h3>동아리 선택</h3>';
    data.forEach(c=>{
      const b=document.createElement('button');
      b.className='btn';
      b.innerText=c;
      b.onclick=()=>{
        document.querySelectorAll('#step-clubs .btn').forEach(x=>x.classList.remove('selected'));
        b.classList.add('selected');
        selClub=c;
        loadMembers(c);
      };
      box.appendChild(b);
    });
  });
}

function loadMembers(club){
  showStep(3);
  const box=document.getElementById('step-members');
  selMembers=[];

  fetch(`${API}?mode=getMembers&club=${encodeURIComponent(club)}`)
  .then(r=>r.json())
  .then(data=>{
    box.innerHTML=`<h3>${club}</h3>`;
    data.forEach(m=>{
      const b=document.createElement('button');
      b.className='btn';
      b.innerText=m;
      b.onclick=()=>{
        b.classList.toggle('selected');
        const i=selMembers.indexOf(m);
        i>-1?selMembers.splice(i,1):selMembers.push(m);
      };
      box.appendChild(b);
    });

    const submit=document.createElement('button');
    submit.className='btn primary';
    submit.innerText='출석 제출';
    submit.onclick=submitAttendance;
    box.appendChild(submit);
  });
}

// 🔥 핵심 수정 (여기)
function submitAttendance(){
  if(!selMembers.length){
    showToast("인원 선택");
    return;
  }

  const params = new URLSearchParams({
    mode:"submitAttendance",
    club:selClub,
    members:JSON.stringify(selMembers)
  });

  fetch(API,{
    method:"POST",
    body:params
  })
  .then(res=>res.text())
  .then(text=>{
    try{
      const data=JSON.parse(text);
      showToast(data.msg || "출석 완료");
      showView('home');
    }catch{
      showToast("응답 오류");
    }
  })
  .catch(()=>showToast("전송 실패"));
}

// ===== 대관 =====
function sendBooking(){
  const params = new URLSearchParams({
    mode:"submitBooking",
    name:b_name.value,
    phone:b_phone.value,
    space:b_space.value,
    content:b_content.value,
    dateTime:b_date.value,
    hours:b_hours.value
  });

  fetch(API,{method:"POST", body:params})
  .then(res=>res.text())
  .then(t=>showToast("대관 완료"))
  .catch(()=>showToast("전송 실패"));
}

// ===== 외부 =====
function sendExternal(){
  const params = new URLSearchParams({
    mode:"submitExternal",
    club:e_club.value,
    phone:e_phone.value,
    event:e_event.value,
    content:e_content.value,
    dateTime:e_date.value
  });

  fetch(API,{method:"POST", body:params})
  .then(res=>res.text())
  .then(t=>showToast("등록 완료"))
  .catch(()=>showToast("전송 실패"));
}

// 뒤로
function back(){
  if(step===1) showView('home');
  else showStep(step-1);
}

</script>

</body>
</html>
