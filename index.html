<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>남양주시 문화의집 웹시스템</title>
    <style>
        :root { --main-font-size: 20px; --title-font-size: 28px; --btn-padding: 22px; }
        
        body { font-family: -apple-system, sans-serif; background: #f2f4f6; margin: 0; padding: 0; font-size: var(--main-font-size); color: #191f28; }
        .container { max-width: 600px; margin: auto; padding: 15px; }
        .card { background: white; padding: 30px 20px; border-radius: 24px; box-shadow: 0 10px 25px rgba(0,0,0,0.07); margin-bottom: 20px; box-sizing: border-box; }
        
        .btn { width: 100%; padding: var(--btn-padding); margin-top: 15px; border: none; border-radius: 18px; font-size: 22px; cursor: pointer; transition: 0.2s; background: #f9fafb; font-weight: 600; box-sizing: border-box; display: flex; align-items: center; justify-content: center; }
        .btn:active { transform: scale(0.97); }
        
        .primary { background: #3182f6; color: white; }
        .secondary { background: #e5e8eb; color: #4e5968; margin-top: 25px; }
        
        .selected { background: #3182f6 !important; color: white !important; }
        .selected::after { content: ' ✅'; margin-left: 8px; font-size: 1.1em; }
        
        .hidden { display: none; }
        input, select { width: 100%; padding: 20px; margin-top: 12px; border: 2px solid #ddd; border-radius: 14px; box-sizing: border-box; font-size: 20px; background-color: white; }
        h2 { text-align: center; font-size: 32px; margin-top: 0; margin-bottom: 20px; line-height: 1.3; }
        h3 { text-align: center; font-size: 26px; margin-top: 0; margin-bottom: 15px; color: #333; }
        label { display: block; margin-top: 20px; font-weight: bold; font-size: 20px; color: #4e5968; padding-left: 5px; }

        .calendar-container { width: 100%; height: 80vh; border-radius: 16px; overflow: hidden; border: 2px solid #e5e8eb; margin-top: 10px; }
        iframe { width: 100%; height: 100%; border: none; }

        #member-list { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 15px; }
        #member-list .btn { margin-top: 0; padding: 18px; font-size: 18px; }

        /* ✅ 자동 소멸 메시지(토스트) 스타일 */
        #toast {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.85); color: white; padding: 30px 50px;
            border-radius: 20px; font-size: 28px; font-weight: bold; z-index: 9999;
            text-align: center; display: none; box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        /* 배경 어둡게 */
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.3); z-index: 9998; display: none;
        }
    </style>
</head>
<body>

<div id="overlay"></div>
<div id="toast">제출 완료 ✅</div>

<div class="container">
    <div id="view-home" class="card">
        <h2>문화의집<br>동아리 통합 시스템</h2>
        <button class="btn primary" onclick="showView('attendance')">동아리 출석체크</button>
        <button class="btn primary" onclick="showView('booking')">대관 신청</button>
        <button class="btn primary" onclick="showView('external')">외부활동 공유</button>
        <button class="btn" onclick="showView('calendar')" style="background:#fff; border:2px solid #3182f6; color:#3182f6; margin-top:30px;">📅 동아리 활동 일정 확인</button>
    </div>

    <div id="view-attendance" class="card hidden">
        <div id="step-days">
            <h3>요일을 골라주세요</h3>
            <div id="day-buttons"></div>
        </div>
        <div id="step-clubs" class="hidden">
            <h3>동아리를 골라주세요</h3>
            <div id="club-buttons"></div>
        </div>
        <div id="step-members" class="hidden">
            <h3 id="club-title" style="color:#3182f6;"></h3>
            <p style="text-align:center; margin:0 0 10px 0; color:#666;">출석한 분들을 눌러주세요</p>
            <div id="member-list"></div>
            <button class="btn primary" id="btn-submit-att" onclick="submitAttendance()" style="margin-top:30px; font-size:24px;">출석 제출하기</button>
        </div>
        <button class="btn secondary" onclick="handleBack()">뒤로가기</button>
    </div>

    <div id="view-booking" class="card hidden">
        <h3>대관 신청서</h3>
        <input id="b_name" placeholder="신청자 이름">
        <input id="b_phone" placeholder="전화번호">
        <label>공간 선택</label>
        <select id="b_space">
            <option value="어울림방">어울림방 (1층)</option>
            <option value="댄스실">댄스실 (2층)</option>
            <option value="음악실">음악실 (2층)</option>
            <option value="동아리방">동아리방 (3층)</option>
        </select>
        <input id="b_content" placeholder="사용 목적">
        <label>이용 일시</label>
        <input id="b_date" type="datetime-local">
        <label>사용 시간</label>
        <select id="b_hours">
            <option value="1">1시간</option><option value="2">2시간</option><option value="3">3시간</option>
        </select>
        <button class="btn primary" id="btn-submit-book" onclick="sendPost('submitBooking')" style="margin-top:30px;">대관 신청하기</button>
        <button class="btn secondary" onclick="showView('home')">메인으로</button>
    </div>

    <div id="view-external" class="card hidden">
        <h3>외부활동 공유</h3>
        <input id="e_club" placeholder="동아리 이름">
        <input id="e_phone" placeholder="연락처">
        <input id="e_event" placeholder="행사명">
        <input id="e_content" placeholder="상세 내용">
        <label>행사 일시</label>
        <input id="e_date" type="datetime-local">
        <button class="btn primary" id="btn-submit-ext" onclick="sendPost('submitExternal')" style="margin-top:30px;">공유하기</button>
        <button class="btn secondary" onclick="showView('home')">메인으로</button>
    </div>

    <div id="view-calendar" class="card hidden" style="padding: 20px 10px;">
        <h3>동아리 활동 일정</h3>
        <div class="calendar-container">
            <iframe src="https://calendar.google.com/calendar/embed?src=50489bb94f6692f724424cec2456fc1cc336bebd077ead18d09bba1f3ef2d4b7@group.calendar.google.com&ctz=Asia/Seoul&mode=AGENDA&showTitle=0&showNav=1&showDate=1&showPrint=0&showTabs=0&showCalendars=0&showTz=0" frameborder="0" scrolling="no"></iframe>
        </div>
        <button class="btn secondary" onclick="showView('home')" style="margin-top:20px;">메인으로</button>
    </div>
</div>

<script>
    const API = "https://script.google.com/macros/s/AKfycbxCDrLBT4TZin5j4avtPIIyl0Ov84VqTm7C3fLLsf_-lal0Oaw2-eTnCM1T_W3LZifN/exec";
    let curStep = 1, selDay = '', selClub = '', selMembers = [];

    function showView(v) {
        document.querySelectorAll('.card').forEach(c => c.classList.add('hidden'));
        document.getElementById('view-' + v).classList.remove('hidden');
        if(v === 'attendance') initDays();
        window.scrollTo(0, 0);
    }

    function initDays() {
        showStep(1);
        const days = ['화','수','목','금','토','일'];
        const box = document.getElementById('day-buttons'); box.innerHTML = '';
        days.forEach(d => {
            const b = document.createElement('button'); b.className = 'btn'; b.innerText = d + '요일';
            b.onclick = () => { 
                b.classList.add('selected'); 
                setTimeout(() => { selDay = d; loadClubs(d); }, 300); 
            };
            box.appendChild(b);
        });
    }

    async function loadClubs(day) {
        showStep(2);
        const box = document.getElementById('club-buttons'); box.innerHTML = '<p style="text-align:center;">불러오는 중...</p>';
        const res = await fetch(`${API}?mode=getClubs&day=${day}`);
        const clubs = await res.json();
        box.innerHTML = '';
        clubs.forEach(c => {
            const b = document.createElement('button'); b.className = 'btn'; b.innerText = c;
            b.onclick = () => { 
                b.classList.add('selected');
                setTimeout(() => { selClub = c; loadMembers(c); }, 300);
            };
            box.appendChild(b);
        });
    }

    async function loadMembers(club) {
        showStep(3);
        document.getElementById('club-title').innerText = club;
        const box = document.getElementById('member-list'); box.innerHTML = ''; selMembers = [];
        const res = await fetch(`${API}?mode=getMembers&club=${club}`);
        const members = await res.json();
        members.forEach(m => {
            const b = document.createElement('button'); b.className = 'btn'; b.innerText = m;
            b.onclick = () => {
                b.classList.toggle('selected');
                const i = selMembers.indexOf(m);
                i > -1 ? selMembers.splice(i, 1) : selMembers.push(m);
            };
            box.appendChild(b);
        });
    }

    function showStep(s) {
        curStep = s;
        document.getElementById('step-days').classList.toggle('hidden', s!==1);
        document.getElementById('step-clubs').classList.toggle('hidden', s!==2);
        document.getElementById('step-members').classList.toggle('hidden', s!==3);
    }

    function handleBack() {
        if(curStep === 1) showView('home'); else showStep(curStep - 1);
    }

    // ✅ 토스트 알림 표시 함수
    function showCompleteToast() {
        document.getElementById('overlay').style.display = 'block';
        document.getElementById('toast').style.display = 'block';
        setTimeout(() => {
            location.reload(); // 2초 뒤 새로고침 (메인화면 이동)
        }, 2000);
    }

    async function sendPost(mode) {
        let data = { mode: mode };
        if(mode === 'submitAttendance') {
            data.clubName = selClub; data.attendees = selMembers;
        } else if(mode === 'submitBooking') {
            data.name = document.getElementById('b_name').value;
            data.phone = document.getElementById('b_phone').value;
            data.space = document.getElementById('b_space').value;
            data.content = document.getElementById('b_content').value;
            data.dateTime = document.getElementById('b_date').value;
            data.hours = document.getElementById('b_hours').value;
            if(!data.name || !data.dateTime) return alert("필수 정보를 입력해주세요.");
        } else if(mode === 'submitExternal') {
            data.club = document.getElementById('e_club').value;
            data.phone = document.getElementById('e_phone').value;
            data.event = document.getElementById('e_event').value;
            data.content = document.getElementById('e_content').value;
            data.dateTime = document.getElementById('e_date').value;
            if(!data.club || !data.dateTime) return alert("필수 정보를 입력해주세요.");
        }

        // 전송 중임을 알리기 위해 버튼 비활성화
        const submitBtns = document.querySelectorAll('.primary');
        submitBtns.forEach(btn => btn.disabled = true);

        // 실제 전송
        await fetch(API, { method: "POST", body: JSON.stringify(data), mode: "no-cors" });
        
        // 완료 알림 실행
        showCompleteToast();
    }

    function submitAttendance() {
        if(!selMembers.length) return alert("인원을 선택하세요.");
        sendPost('submitAttendance');
    }
</script>
</body>
</html>
