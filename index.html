<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: sans-serif;
      margin: 0;
      background: #f5f6f8;
    }

    h1 {
      text-align: center;
      padding: 18px;
      font-size: 22px;
      background: #2d6cdf;
      color: white;
      margin: 0;
    }

    .page {
      display: none;
      padding: 15px;
    }

    .active {
      display: block;
    }

    button {
      width: 100%;
      padding: 14px;
      margin: 6px 0;
      border: none;
      border-radius: 10px;
      background: #2d6cdf;
      color: white;
      font-size: 15px;
    }

    .back {
      background: #777;
    }

    input, select, textarea {
      width: 100%;
      padding: 10px;
      margin: 6px 0;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
    }

    textarea {
      height: 80px;
    }

    .title {
      font-weight: bold;
      margin: 10px 0;
      font-size: 18px;
    }

  </style>
</head>

<body>

<h1>남양주시 문화의집</h1>

<!-- ================= HOME ================= -->
<div id="home" class="page active">
  <button onclick="go('attendance1')">📋 동아리 출석체크</button>
  <button onclick="go('booking')">🏢 대관신청</button>
  <button onclick="go('external')">📣 외부활동공유</button>
  <button onclick="go('calendar')">📅 캘린더</button>
</div>

<!-- ================= 출석 1 ================= -->
<div id="attendance1" class="page">
  <div class="title">동아리 선택</div>
  <div id="clubList"></div>
  <button class="back" onclick="go('home')">돌아가기</button>
</div>

<!-- ================= 출석 2 ================= -->
<div id="attendance2" class="page">
  <div class="title">이름 선택</div>
  <div id="memberList"></div>

  <button onclick="submitAttendance()">출석 제출</button>
  <button class="back" onclick="go('home')">처음으로</button>
</div>

<!-- ================= 대관 ================= -->
<div id="booking" class="page">
  <div class="title">대관 신청</div>

  <input id="b_name" placeholder="이름">
  <input id="b_phone" placeholder="전화번호">
  <input id="b_space" placeholder="대관공간">
  <textarea id="b_content" placeholder="대관내용"></textarea>

  <label>대관일시</label>
  <input id="b_datetime" type="datetime-local">

  <label>이용시간</label>
  <select id="b_hours">
    <option value="1">1시간</option>
    <option value="2">2시간</option>
    <option value="3">3시간</option>
    <option value="4">4시간</option>
  </select>

  <button onclick="submitBooking()">제출</button>
  <button class="back" onclick="go('home')">돌아가기</button>
</div>

<!-- ================= 외부활동 ================= -->
<div id="external" class="page">
  <div class="title">외부활동 공유</div>

  <input id="e_club" placeholder="동아리명">
  <input id="e_phone" placeholder="전화번호">
  <input id="e_event" placeholder="행사명">
  <textarea id="e_content" placeholder="활동내용"></textarea>

  <label>활동일시</label>
  <input id="e_datetime" type="datetime-local">

  <button onclick="submitExternal()">제출</button>
  <button class="back" onclick="go('home')">돌아가기</button>
</div>

<!-- ================= 캘린더 ================= -->
<div id="calendar" class="page">
  <div class="title">캘린더</div>

  <iframe
    src="https://calendar.google.com/calendar/embed?src=nyjculturalhouse%40gmail.com&ctz=Asia%2FSeoul"
    style="border:0; width:100%; height:500px;">
  </iframe>

  <button class="back" onclick="go('home')">돌아가기</button>
</div>

<!-- ================= SCRIPT ================= -->
<script>

let selectedClub = "";
let selectedMember = "";

/* ================= 페이지 이동 ================= */
function go(page){
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(page).classList.add('active');

  if(page === "attendance1") loadClubs();
}

/* ================= 동아리 로딩 ================= */
function loadClubs(){
  google.script.run.withSuccessHandler(data=>{
    let html = "";
    data.forEach(c=>{
      html += `<button onclick="selectClub('${c}')">${c}</button>`;
    });
    document.getElementById("clubList").innerHTML = html;
  }).getClubs();
}

/* ================= 동아리 선택 ================= */
function selectClub(club){
  selectedClub = club;
  go("attendance2");

  google.script.run.withSuccessHandler(data=>{
    let html = "";
    data.forEach(m=>{
      html += `<button onclick="selectMember('${m}')">${m}</button>`;
    });
    document.getElementById("memberList").innerHTML = html;
  }).getMembers(club);
}

/* ================= 이름 선택 ================= */
function selectMember(name){
  selectedMember = name;
  alert("선택됨: " + selectedClub + " / " + selectedMember);
}

/* ================= 출석 제출 ================= */
function submitAttendance(){
  google.script.run.withSuccessHandler(()=>{
    alert("출석 완료");
    go("home");
  }).saveAttendance(selectedClub, selectedMember, new Date().toLocaleDateString());
}

/* ================= 대관 ================= */
function submitBooking(){
  google.script.run.withSuccessHandler(()=>{
    alert("대관 등록 완료");
    go("home");
  }).submitBooking({
    name: b_name.value,
    phone: b_phone.value,
    space: b_space.value,
    content: b_content.value,
    dateTime: b_datetime.value,
    hours: b_hours.value
  });
}

/* ================= 외부활동 ================= */
function submitExternal(){
  google.script.run.withSuccessHandler(()=>{
    alert("등록 완료");
    go("home");
  }).submitExternal({
    club: e_club.value,
    phone: e_phone.value,
    event: e_event.value,
    content: e_content.value,
    dateTime: e_datetime.value
  });
}

</script>

</body>
</html>
