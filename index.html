<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: 'Noto Sans KR';
  background: #f2f4f6;
  margin: 0;
}

.container {
  padding: 20px;
  max-width: 600px;
  margin: auto;
}

.card {
  background: #fff;
  padding: 20px;
  border-radius: 16px;
  margin-top: 15px;
}

.btn {
  width: 100%;
  padding: 15px;
  margin-top: 10px;
  font-size: 16px;
  border: 0;
  border-radius: 10px;
  background: #fff;
  box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}

.hidden { display:none; }

.selected {
  background:#3182f6;
  color:#fff;
}

.progress {
  height: 8px;
  background: #ddd;
  border-radius: 10px;
  overflow: hidden;
  margin-bottom: 10px;
}

.bar {
  height: 100%;
  width: 0%;
  background: #3182f6;
  transition: 0.3s;
}
</style>
</head>

<body>
<div class="container">

<h2>남양주시 문화의집</h2>

<!-- 홈 -->
<div id="home" class="card">
  <button class="btn" onclick="go('attendance')">출석체크</button>
  <button class="btn" onclick="go('reservation')">대관 신청</button>
  <button class="btn" onclick="go('external')">외부 일정 공유</button>
  <button class="btn" onclick="go('calendar')">캘린더</button>
</div>

<!-- 출석 -->
<div id="attendance" class="card hidden">

  <div class="progress">
    <div class="bar" id="bar"></div>
  </div>

  <div id="step-area"></div>

  <button class="btn" onclick="submitAttendance()">출석 저장</button>
  <button class="btn" onclick="resetAll(); go('home')">홈으로</button>
</div>

<!-- 캘린더 -->
<div id="calendar" class="card hidden">
  <iframe 
    src="https://calendar.google.com/calendar/embed?src=nyjculturalhouse@gmail.com&ctz=Asia%2FSeoul"
    style="width:100%; height:500px; border:0;">
  </iframe>
  <button class="btn" onclick="go('home')">뒤로</button>
</div>

</div>

<script>
const API_URL = "YOUR_WEBAPP_URL";

let state = {
  step: 1,
  day: "",
  club: "",
  members: []
};

function go(id){
  document.querySelectorAll('.card').forEach(c=>c.classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');

  if(id === "attendance"){
    renderDays();
  }
}

/* ---------------------------
   진행바
----------------------------*/
function updateBar(){
  const bar = document.getElementById("bar");
  bar.style.width = (state.step / 3 * 100) + "%";
}

/* ---------------------------
   초기화
----------------------------*/
function resetAll(){
  state = { step:1, day:"", club:"", members:[] };
}

/* ---------------------------
   STEP 1 - 요일
----------------------------*/
function renderDays(){
  state.step = 1;
  updateBar();

  const el = document.getElementById("step-area");
  el.innerHTML = "<h3>1. 요일 선택</h3>";

  ["화","수","목","금","토","일"].forEach(d=>{
    const b = document.createElement("button");
    b.className = "btn";
    b.innerText = d + "요일";

    b.onclick = ()=>{
      state.day = d;
      loadClubs(d);
    };

    el.appendChild(b);
  });
}

/* ---------------------------
   STEP 2 - 동아리
----------------------------*/
function loadClubs(day){
  state.step = 2;
  updateBar();

  fetch(API_URL,{
    method:"POST",
    body:JSON.stringify({type:"getClubs", day})
  })
  .then(r=>r.json())
  .then(data=>{
    const el = document.getElementById("step-area");
    el.innerHTML = "<h3>2. 동아리 선택</h3>";

    data.clubs.forEach(c=>{
      const b = document.createElement("button");
      b.className = "btn";
      b.innerText = c;

      b.onclick = ()=>{
        state.club = c;
        loadMembers(c);
      };

      el.appendChild(b);
    });
  });
}

/* ---------------------------
   STEP 3 - 이름
----------------------------*/
function loadMembers(club){
  state.step = 3;
  updateBar();
  state.members = [];

  fetch(API_URL,{
    method:"POST",
    body:JSON.stringify({type:"getMembers", club})
  })
  .then(r=>r.json())
  .then(data=>{
    const el = document.getElementById("step-area");
    el.innerHTML = "<h3>3. 이름 선택</h3>";

    data.members.forEach(m=>{
      const b = document.createElement("button");
      b.className = "btn";
      b.innerText = m;

      b.onclick = ()=>{
        const i = state.members.indexOf(m);
        if(i>-1){
          state.members.splice(i,1);
          b.classList.remove("selected");
        }else{
          state.members.push(m);
          b.classList.add("selected");
        }
      };

      el.appendChild(b);
    });
  });
}

/* ---------------------------
   제출
----------------------------*/
function submitAttendance(){

  if(!state.club || state.members.length===0){
    alert("선택 안됨");
    return;
  }

  fetch(API_URL,{
    method:"POST",
    body:JSON.stringify({
      type:"attendance",
      club: state.club,
      members: state.members.join(",")
    })
  })
  .then(()=> {
    alert("출석 완료");
    resetAll();
    go("home");
  });
}
</script>

</body>
</html>
