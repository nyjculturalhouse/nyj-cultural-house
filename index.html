<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { font-family:-apple-system; background:#f2f4f6; margin:0; }
.container { max-width:760px; margin:auto; padding:24px; }
.card { background:white; padding:30px; border-radius:22px; margin-bottom:20px; }
.btn { width:100%; padding:22px; margin-top:12px; border:none; border-radius:16px; font-size:20px; }
.primary { background:#3182f6; color:white; }
.back { background:#e5e7eb; }
input, select { width:100%; padding:16px; margin-top:10px; border-radius:12px; }
.hidden { display:none; }
</style>
</head>

<body>

<div class="container">

<div id="view-home" class="card">
<button class="btn primary" onclick="showView('booking')">대관</button>
<button class="btn primary" onclick="showView('external')">외부</button>
</div>

<!-- 대관 -->
<div id="view-booking" class="card hidden">
<input id="b_name">
<input id="b_phone">
<input id="b_space">
<input id="b_content">
<input id="b_date" type="datetime-local">

<select id="b_hours">
<option value="1">1시간</option>
<option value="2">2시간</option>
</select>

<button class="btn primary" onclick="sendBooking()">전송</button>
<button class="btn back" onclick="showView('home')">뒤로</button>
</div>

<!-- 외부 -->
<div id="view-external" class="card hidden">
<input id="e_club">
<input id="e_phone">
<input id="e_event">
<input id="e_content">
<input id="e_date" type="datetime-local">

<button class="btn primary" onclick="sendExternal()">전송</button>
<button class="btn back" onclick="showView('home')">뒤로</button>
</div>

</div>

<script>

const API = "YOUR_SCRIPT_URL";

// ================= 화면 =================
function showView(v){
  document.querySelectorAll(".card").forEach(c=>c.classList.add("hidden"));
  document.getElementById("view-"+v).classList.remove("hidden");
}

// ================= POST (핵심) =================
async function post(data){
  return await fetch(API,{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body:JSON.stringify(data)
  });
}

// ================= 대관 =================
async function sendBooking(){

  await post({
    mode:"submitBooking",
    name:b_name.value,
    phone:b_phone.value,
    space:b_space.value,
    content:b_content.value,
    dateTime:b_date.value,
    hours:b_hours.value
  });

  alert("대관 완료 (캘린더 반영됨)");
  showView("home");
}

// ================= 외부 =================
async function sendExternal(){

  await post({
    mode:"submitExternal",
    club:e_club.value,
    phone:e_phone.value,
    event:e_event.value,
    content:e_content.value,
    dateTime:e_date.value
  });

  alert("외부 완료 (캘린더 반영됨)");
  showView("home");
}

</script>

</body>
</html>
