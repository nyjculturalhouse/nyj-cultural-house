<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: -apple-system, sans-serif; background: #f2f4f6; margin: 0; padding: 0; }
        .container { max-width: 600px; margin: auto; padding: 20px; }
        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .btn { width: 100%; padding: 18px; margin-top: 10px; border: none; border-radius: 14px; font-size: 18px; cursor: pointer; transition: 0.2s; background: #f9fafb; }
        .btn:active { transform: scale(0.98); }
        .primary { background: #3182f6; color: white; font-weight: bold; }
        .selected { background: #3182f6 !important; color: white !important; }
        .hidden { display: none; }
        input, select { width: 100%; padding: 15px; margin-top: 10px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 16px; background-color: white; }
        h2, h3 { text-align: center; color: #191f28; }
        
        /* 캘린더 전용 스타일 */
        .calendar-wrapper { position: relative; padding-bottom: 75%; height: 0; overflow: hidden; border-radius: 12px; border: 1px solid #e5e8eb; }
        .calendar-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }
    </style>
</head>
<body>

<div class="container">
    <div id="view-home" class="card">
        <h2>문화의집 시스템</h2>
        <button class="btn primary" onclick="showView('attendance')">출석체크</button>
        <button class="btn primary" onclick="showView('booking')">대관 신청</button>
        <button class="btn primary" onclick="showView('external')">외부활동 공유</button>
        <button class="btn" onclick="showView('calendar')">🗓️ 캘린더 바로보기</button>
    </div>

    <div id="view-attendance" class="card hidden">
        <div id="step-days">
            <h3>요일 선택</h3>
            <div id="day-buttons"></div>
        </div>
        <div id="step-clubs" class="hidden">
            <h3>동아리 선택</h3>
            <div id="club-buttons"></div>
        </div>
        <div id="step-members" class="hidden">
            <h3 id="club-title"></h3>
            <div id="member-list" style="display:grid; grid-template-columns:1fr 1fr; gap:10px;"></div>
            <button class="btn primary" onclick="submitAttendance()" style="margin-top:20px;">출석 제출</button>
        </div>
        <button class="btn" onclick="handleBack()" style="margin-top:15px;">뒤로가기</button>
    </div>

    <div id="view-booking" class="card hidden">
        <h3>대관 신청</h3>
        <input id="b_name" placeholder="신청자 성함">
        <input id="b_phone" placeholder="연락처">
        
        <label style="display:block; margin-top:15px; font-weight:bold; color:#4e5968;">공간 선택</label>
        <select id="b_space">
            <option value="어울림방">어울림방</option>
            <option value="댄스실">댄스실</option>
            <option value="음악실">음악실</option>
            <option value="동아리방">동아리방</option>
        </select>
        
        <input id="b_content" placeholder="사용 목적">
        <input id="b_date" type="datetime-local">
        
        <label style="display:block; margin-top:15px; font-weight:bold; color:#4e5968;">사용 시간</label>
        <select id="b_hours">
            <option value="1">1시간</option>
            <option value="2">2시간</option>
            <option value="3">3시간</option>
        </select>
        
        <button class="btn primary" onclick="sendPost('submitBooking')">신청하기</button>
        <button class="btn" onclick="showView('home')">메인으로</button>
    </div>

    <div id="view-external" class="card hidden">
        <h3>외부활동 공유</h3>
        <input id="e_club" placeholder="동아리명">
        <input id="e_phone" placeholder="연락처">
        <input id="e_event" placeholder="행사명">
        <input id="e_content" placeholder="내용">
        <input id="e_date" type="datetime-local">
        <button class="btn primary" onclick="sendPost('submitExternal')">공유하기</button>
        <button class="btn" onclick="showView('home')">메인으로</button>
    </div>

    <div id="view-calendar" class="card hidden">
        <h3>시설 이용 일정</h3>
        <div class="calendar-wrapper">
            <iframe src="https://calendar.google.com/calendar/embed?src=50489bb94f6692f724424cec2456fc1cc336bebd077ead18d09bba1f3ef2d4b7@group.calendar.google.com&ctz=Asia/Seoul" style="border: 0" width="800" height="600" frameborder="0" scrolling="no"></iframe>
        </div>
        <button class="btn" onclick="showView('home')" style="margin-top:15px;">메인으로</button>
    </div>
</div>

<script>
    const API = "https://script.google.com/macros/s/AKfycbxCDrLBT4TZin5j4avtPIIyl0Ov84VqTm7C3fLLsf_-lal0Oaw2-eTnCM1T_W3LZifN/exec";
    let curStep = 1, selDay = '', selClub = '', selMembers = [];

    function showView(v) {
        document.querySelectorAll('.card').forEach(c => c.classList.add('hidden'));
        document.getElementById('view-' + v).classList.remove('hidden');
        if(v === 'attendance') initDays();
    }

    function initDays() {
        showStep(1);
        const days = ['화','수','목','금','토','일'];
        const box = document.getElementById('day-buttons'); box.innerHTML = '';
        days.forEach(d => {
            const b = document.createElement('button'); b.className = 'btn'; b.innerText = d + '요일';
            b.onclick = () => { selDay = d; loadClubs(d); };
            box.appendChild(b);
        });
    }

    async function loadClubs(day) {
        showStep(2);
        const res = await fetch(`${API}?mode=getClubs&day=${day}`);
        const clubs = await res.json();
        const box = document.getElementById('club-buttons'); box.innerHTML = '';
        clubs.forEach(c => {
            const b = document.createElement('button'); b.className = 'btn'; b.innerText = c;
            b.onclick = () => { selClub = c; loadMembers(c); };
            box.appendChild(b);
        });
    }

    async function loadMembers(club) {
        showStep(3);
        document.getElementById('club-title').innerText = club;
        const res = await fetch(`${API}?mode=getMembers&club=${club}`);
        const members = await res.json();
        const box = document.getElementById('member-list'); box.innerHTML = ''; selMembers = [];
        members.forEach(m => {
            const b = document.createElement('button'); b.className = 'btn'; b.innerText = m;
            b.onclick = () => {
                b.classList.toggle('selected');
                const i = selMembers.indexOf(m);
                i > -1 ? selMembers.splice(i, 1) : selMembers.push(m);
            };
            box.appendChild(b);
        });
    }

    function showStep(s) {
        curStep = s;
        document.getElementById('step-days').classList.toggle('hidden', s!==1);
        document.getElementById('step-clubs').classList.toggle('hidden', s!==2);
        document.getElementById('step-members').classList.toggle('hidden', s!==3);
    }

    function handleBack() {
        if(curStep === 1) showView('home'); else showStep(curStep - 1);
    }

    async function sendPost(mode) {
        let data = { mode: mode };
        if(mode === 'submitAttendance') {
            data.clubName = selClub; data.attendees = selMembers;
        } else if(mode === 'submitBooking') {
            // 공간 선택(b_space) 값을 드롭다운에서 가져옴
            data.name = document.getElementById('b_name').value;
            data.phone = document.getElementById('b_phone').value;
            data.space = document.getElementById('b_space').value; 
            data.content = document.getElementById('b_content').value;
            data.dateTime = document.getElementById('b_date').value;
            data.hours = document.getElementById('b_hours').value;
        } else if(mode === 'submitExternal') {
            data.club = document.getElementById('e_club').value;
            data.phone = document.getElementById('e_phone').value;
            data.event = document.getElementById('e_event').value;
            data.content = document.getElementById('e_content').value;
            data.dateTime = document.getElementById('e_date').value;
        }

        await fetch(API, { method: "POST", body: JSON.stringify(data), mode: "no-cors" });
        alert("처리가 완료되었습니다!");
        location.reload();
    }

    function submitAttendance() {
        if(!selMembers.length) return alert("인원을 선택하세요.");
        sendPost('submitAttendance');
    }
</script>
</body>
</html>
