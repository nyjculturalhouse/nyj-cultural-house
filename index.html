<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family:-apple-system;
  background:#f2f4f6;
  margin:0;
}

.container {
  max-width:760px;
  margin:auto;
  padding:24px;
}

.card {
  background:white;
  padding:30px;
  border-radius:22px;
  margin-bottom:20px;
  box-shadow:0 8px 20px rgba(0,0,0,0.05);
}

.btn {
  width:100%;
  padding:22px;
  margin-top:12px;
  border:none;
  border-radius:16px;
  font-size:20px;
  cursor:pointer;
}

.btn:active { transform:scale(0.98); }

.primary { background:#3182f6; color:white; }
.back { background:#e5e7eb; color:#333; }

.selected {
  background:#3182f6;
  color:white;
  position:relative;
}

.selected::after {
  content:"✓";
  position:absolute;
  right:18px;
  top:50%;
  transform:translateY(-50%);
  width:28px;
  height:28px;
  background:white;
  color:#3182f6;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:bold;
  font-size:16px;
}

.hidden { display:none; }

input, select {
  width:100%;
  padding:16px;
  margin-top:10px;
  border-radius:12px;
  border:1px solid #ddd;
  font-size:18px;
}
</style>
</head>

<body>

<div class="container">

<div id="view-home" class="card">
<h2 style="text-align:center;">문화의집 시스템</h2>

<button class="btn primary" onclick="showView('attendance')">출석체크</button>
<button class="btn primary" onclick="showView('booking')">대관 신청</button>
<button class="btn primary" onclick="showView('external')">외부활동</button>
</div>

<!-- 대관 -->
<div id="view-booking" class="card hidden">
<h3>대관 신청</h3>

<input id="b_name" placeholder="이름">
<input id="b_phone" placeholder="전화번호">

<h4>공간 선택</h4>
<div id="spaceBox"></div>

<input id="b_content" placeholder="내용">
<input id="b_date" type="datetime-local">

<select id="b_hours">
<option value="1">1시간</option>
<option value="2">2시간</option>
<option value="3">3시간</option>
</select>

<button class="btn primary" onclick="sendBooking()">신청</button>
<button class="btn back" onclick="showView('home')">뒤로가기</button>
</div>

<!-- 외부 -->
<div id="view-external" class="card hidden">
<h3>외부활동</h3>

<input id="e_club" placeholder="동아리">
<input id="e_phone" placeholder="연락처">
<input id="e_event" placeholder="행사명">
<input id="e_content" placeholder="내용">
<input id="e_date" type="datetime-local">

<button class="btn primary" onclick="sendExternal()">제출</button>
<button class="btn back" onclick="showView('home')">뒤로가기</button>
</div>

</div>

<script>

const API = "https://script.google.com/macros/s/AKfycbzg8cnqcvWHhAutwqItto9Wucn4dig92Jm8_ZfQgLZ8S2zSunebUlHjrm0aPvTILlBA/exec";

let selectedSpace="";

// ================= 화면 =================
function showView(v){
  document.querySelectorAll('.card').forEach(c=>c.classList.add('hidden'));
  document.getElementById('view-'+v).classList.remove('hidden');

  if(v==='booking') loadSpaces();
}

// ================= 공간 =================
function loadSpaces(){
  const spaces=["어울림방","댄스실","음악실","동아리방"];
  const box=document.getElementById("spaceBox");

  box.innerHTML="";

  spaces.forEach(s=>{
    const b=document.createElement("button");
    b.className="btn";
    b.innerText=s;

    b.onclick=()=>{
      selectedSpace=s;
      document.querySelectorAll("#spaceBox .btn").forEach(x=>x.classList.remove("selected"));
      b.classList.add("selected");
    };

    box.appendChild(b);
  });
}

// ================= POST 핵심 (FIX) =================
async function post(data){
  return fetch(API, {
    method: "POST",
    headers: {
      "Content-Type": "text/plain"
    },
    body: JSON.stringify(data)
  });
}

// ================= 대관 =================
async function sendBooking(){

  if(!selectedSpace){
    alert("공간 선택");
    return;
  }

  const date = b_date.value;
  if(!date){
    alert("날짜 선택");
    return;
  }

  await post({
    mode:"submitBooking",
    name:b_name.value,
    phone:b_phone.value,
    space:selectedSpace,
    content:b_content.value,
    dateTime:date,
    hours:b_hours.value
  });

  alert("대관 완료");
  showView("home");
}

// ================= 외부 =================
async function sendExternal(){

  const date = e_date.value;
  if(!date){
    alert("날짜 선택");
    return;
  }

  await post({
    mode:"submitExternal",
    club:e_club.value,
    phone:e_phone.value,
    event:e_event.value,
    content:e_content.value,
    dateTime:date
  });

  alert("외부 완료");
  showView("home");
}

</script>

</body>
</html>
