<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>남양주시 문화의집 웹시스템</title>
    <style>
        :root { --main-font-size: 20px; --title-font-size: 28px; --btn-padding: 22px; }
        
        body { font-family: -apple-system, sans-serif; background: #f2f4f6; margin: 0; padding: 0; font-size: var(--main-font-size); color: #191f28; }
        .container { max-width: 600px; margin: auto; padding: 15px; }
        .card { background: white; padding: 30px 20px; border-radius: 24px; box-shadow: 0 10px 25px rgba(0,0,0,0.07); margin-bottom: 20px; box-sizing: border-box; }
        
        .btn { width: 100%; padding: var(--btn-padding); margin-top: 15px; border: none; border-radius: 18px; font-size: 22px; cursor: pointer; transition: 0.2s; background: #f9fafb; font-weight: 600; box-sizing: border-box; display: flex; align-items: center; justify-content: center; }
        .btn:active { transform: scale(0.97); }
        
        .primary { background: #3182f6; color: white; }
        .secondary { background: #e5e8eb; color: #4e5968; margin-top: 25px; }
        
        .selected { background: #3182f6 !important; color: white !important; }
        .selected::after { content: ' ✅'; margin-left: 8px; font-size: 1.1em; }
        
        .hidden { display: none; }
        input, select { width: 100%; padding: 20px; margin-top: 12px; border: 2px solid #ddd; border-radius: 14px; box-sizing: border-box; font-size: 20px; background-color: white; }
        h2 { text-align: center; font-size: 32px; margin-top: 0; margin-bottom: 20px; line-height: 1.3; }
        h3 { text-align: center; font-size: 26px; margin-top: 0; margin-bottom: 15px; color: #333; }
        label { display: block; margin-top: 20px; font-weight: bold; font-size: 20px; color: #4e5968; padding-left: 5px; }

        .calendar-container { width: 100%; height: 80vh; border-radius: 16px; overflow: hidden; border: 2px solid #e5e8eb; margin-top: 10px; }
        iframe { width: 100%; height: 100%; border: none; }

        #member-list { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 15px; }
        #member-list .btn { margin-top: 0; padding: 18px; font-size: 18px; }

        /* ✅ 자동 소멸 메시지(토스트) 스타일 */
        #toast {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.85); color: white; padding: 30px 50px;
            border-radius: 20px; font-size: 28px; font-weight: bold; z-index: 9999;
            text-align: center; display: none; box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        /* 배경 어둡게 */
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.3); z-index: 9998; display: none;
        }
    </style>
</head>
<body>

<div id="overlay"></div>
<div id="toast">제출 완료 ✅</div>

<div class="container">
    <div id="view-home" class="card">
        <h2>문화의집<br>동아리 통합 시스템</h2>
        <button class="btn primary" onclick="showView('attendance')">동아리 출석체크</button>
        <button class="btn primary" onclick="showView('booking')">대관 신청</button>
        <button class="btn primary" onclick="showView('external')">외부활동 공유</button>
        <button class="btn" onclick="showView('calendar')" style="background:#fff; border:2px solid #3182f6; color:#3182f6; margin-top:30px;">📅 동아리 활동 일정 확인</button>
    </div>

    <div id="view-attendance" class="card hidden">
        <div id="step-days">
            <h3>요일을 골라주세요</h3>
            <div id="day-buttons"></div>
        </div>
        <div id="step-clubs" class="hidden">
            <h3>동아리를 골라주세요</h3>
            <div id="club-buttons"></div>
        </div>
        <div id="step-members" class="hidden">
            <h3 id="club-title" style="color:#3182f6;"></h3>
            <p style="text-align:center; margin:0 0 10px 0; color:#666;">출석한 분들을 눌러주세요</p>
            <div id="member-list"></div>
            <button class="btn primary" id="btn-submit-att" onclick="submitAttendance()" style="margin-top:30px; font-size:24px;">출석 제출하기</button>
        </div>
        <button class="btn secondary" onclick="handleBack()">뒤로가기</button>
    </div>

    <div id="view-booking" class="card hidden">
        <h3>대관 신청서</h3>
        <input id="b_name" placeholder="신청자 이름">
        <input id="b_phone" placeholder="전화번호">
        <label>공간 선택</label>
        <select id="b_space">
            <option value="어울림방">어울림방 (1층)</option>
            <option value="댄스실">댄스실 (2층)</option>
            <option value="음악실">음악실 (2층)</option>
            <option value="동아리방">동아리방 (3층)</option>
        </select>
        <input id="b_content" placeholder="사용 목적">
        <label>이용 일시</label>
        <input id="b_date" type="datetime-local">
        <label>사용 시간</label>
        <select id="b_hours">
            <option value="1">1시간</option><option value="2">2시간</option><option value="3">3시간</option>
        </select>
        <button class="btn primary" id="btn-submit-book" onclick="sendPost('submitBooking')" style="margin-top:30px;">대관 신청하기</button>
        <button class="btn secondary" onclick="showView('home')">메인으로</button>
    </div>

    <div id="view-external" class="card hidden">
        <h3>외부활동 공유</h3>
        <input id="e_club" placeholder="동아리 이름">
        <input id="e_phone" placeholder="연락처">
        <input id="e_event" placeholder="행사명">
        <input id="e_content" placeholder="상세 내용">
        <label>행사 일시</label>
        <input id="e_date" type="datetime-local">
        <button class="btn primary" id="btn-submit-ext" onclick="sendPost('submitExternal')" style="margin-top:30px;">공유하기</button>
        <button class="btn secondary" onclick="showView('home')">메인으로</button>
    </div>

    <div id="view-calendar" class="card hidden" style="padding: 20px 10px;">
        <h3>동아리 활동 일정</h3>
        <div class="calendar-container">
            <iframe src="
