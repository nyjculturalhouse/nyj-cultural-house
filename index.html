<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>남양주시 문화의집 시스템</title>
    <style>
        /* 어르신들을 위해 전반적인 폰트 크기 확대 */
        :root { --main-font-size: 20px; --title-font-size: 28px; --btn-padding: 22px; }
        
        body { font-family: -apple-system, sans-serif; background: #f2f4f6; margin: 0; padding: 0; font-size: var(--main-font-size); color: #191f28; }
        .container { max-width: 600px; margin: auto; padding: 15px; }
        
        /* 카드 여백 확대 */
        .card { background: white; padding: 30px 20px; border-radius: 24px; box-shadow: 0 10px 25px rgba(0,0,0,0.07); margin-bottom: 20px; box-sizing: border-box; }
        
        /* 버튼 크게 */
        .btn { width: 100%; padding: var(--btn-padding); margin-top: 15px; border: none; border-radius: 18px; font-size: 22px; cursor: pointer; transition: 0.2s; background: #f9fafb; font-weight: 600; box-sizing: border-box; }
        .btn:active { transform: scale(0.97); }
        .primary { background: #3182f6; color: white; }
        .secondary { background: #e5e8eb; color: #4e5968; margin-top: 25px; } /* 목록으로/뒤로가기 버튼은 약간 다르게 */
        .selected { background: #3182f6 !important; color: white !important; }
        .hidden { display: none; }
        
        /* 입력창/선택창 크게 */
        input, select { width: 100%; padding: 20px; margin-top: 12px; border: 2px solid #ddd; border-radius: 14px; box-sizing: border-box; font-size: 20px; background-color: white; }
        input:focus, select:focus { border-color: #3182f6; outline: none; }
        
        h2 { text-align: center; font-size: 32px; margin-top: 0; margin-bottom: 20px; }
        h3 { text-align: center; font-size: 26px; margin-top: 0; margin-bottom: 15px; color: #333; }
        label { display: block; margin-top: 20px; font-weight: bold; font-size: 20px; color: #4e5968; padding-left: 5px; }

        /* ✅ 캘린더 전용 스타일 (시원하게 확대) */
        .calendar-container { 
            width: 100%; 
            height: 80vh; /* 스마트폰 화면 높이의 80% 사용 (매우 크게) */
            border-radius: 16px; 
            overflow: hidden; 
            border: 2px solid #e5e8eb;
            margin-top: 10px;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.05);
        }
        /* iframe 자체에도 원본 크기를 키우도록 유도 */
        iframe { width: 100%; height: 100%; border: none; transform: scale(1); transform-origin: 0 0; }

        /* 멤버 리스트 2열 유지 */
        #member-list { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 15px; }
        #member-list .btn { margin-top: 0; padding: 18px; font-size: 18px; }
        
        /* 요일 버튼 */
        #day-buttons .btn { font-size: 22px; }
    </style>
</head>
<body>

<div class="container">
    <div id="view-home" class="card">
        <h2>문화의집<br>출석/대관 시스템</h2>
        <button class="btn primary" onclick="showView('attendance')">1. 동아리 출석체크</button>
        <button class="btn primary" onclick="showView('booking')">2. 대관 신청</button>
        <button class="btn primary" onclick="showView('external')">3. 외부활동 공유</button>
        <button class="btn" onclick="showView('calendar')" style="background:#fff; border:2px solid #3182f6; color:#3182f6; margin-top:30px;">📅 시설 이용일정 확인</button>
    </div>

    <div id="view-attendance" class="card hidden">
        <div id="step-days">
            <h3>요일을 골라주세요</h3>
            <div id="day-buttons"></div>
        </div>
        <div id="step-clubs" class="hidden">
            <h3>동아리를 골라주세요</h3>
            <div id="club-buttons"></div>
        </div>
        <div id="step-members" class="hidden">
            <h3 id="club-title" style="color:#3182f6;"></h3>
            <p style="text-align:center; margin:0 0 10px 0; color:#666;">출석한 분들을 눌러주세요</p>
            <div id="member-list"></div>
            <button class="btn primary" onclick="submitAttendance()" style="margin-top:30px; font-size:24px;">출석 제출하기</button>
        </div>
        <button class="btn secondary" onclick="handleBack()">뒤로가기</button>
    </div>

    <div id="view-booking" class="card hidden">
        <h3>대관 신청서를 작성해주세요</h3>
        
        <input id="b_name" placeholder="신청자 이름">
        <input id="b_phone" placeholder="전화번호 (예: 010-1234-5678)">
        
        <label>어디를 빌리시나요?</label>
        <select id="b_space">
            <option value="어울림방">어울림방 (1층)</option>
            <option value="댄스실">댄스실 (2층)</option>
            <option value="음악실">음악실 (2층)</option>
            <option value="동아리방">동아리방 (3층)</option>
        </select>
        
        <input id="b_content" placeholder="무엇을 하시나요? (예: 기타 연습)">
        
        <label>언제 이용하시나요?</label>
        <input id="b_date" type="datetime-local" style="font-size:18px;">
        
        <label>몇 시간 이용하시나요?</label>
        <select id="b_hours">
            <option value="1">1시간</option>
            <option value="2">2시간</option>
            <option value="3">3시간</option>
        </select>
        
        <button class="btn primary" onclick="sendPost('submitBooking')" style="margin-top:30px; font-size:24px;">대관 신청하기</button>
        <button class="btn secondary" onclick="showView('home')">메인 화면으로</button>
    </div>

    <div id="view-external" class="card hidden">
        <h3>외부활동을 알려주세요</h3>
        <input id="e_club" placeholder="동아리 이름">
        <input id="e_phone" placeholder="연락처">
        <input id="e_event" placeholder="어떤 행사인가요? (예: 정기공연)">
        <input id="e_content" placeholder="상세 내용">
        <label>행사 일시</label>
        <input id="e_date" type="datetime-local" style="font-size:18px;">
        <button class="btn primary" onclick="sendPost('submitExternal')" style="margin-top:30px; font-size:24px;">활동 공유하기</button>
        <button class="btn secondary" onclick="showView('home')">메인 화면으로</button>
    </div>

    <div id="view-calendar" class="card hidden" style="padding: 20px 10px;">
        <h3>문화의집 시설 이용 일정</h3>
        <p style="text-align:center; margin: -5px 0 10px 0; color:#666; font-size:16px;">아래 목록을 위아래로 밀어서 확인하세요.</p>
        <div class="calendar-container">
            <iframe src="https://calendar.google.com/calendar/embed?src=50489bb94f6692f724424cec2456fc1cc336bebd077ead18d09bba1f3ef2d4b7@group.calendar.google.com&ctz=Asia/Seoul&mode=AGENDA&wkst=1&bgcolor=%23ffffff&showTitle=0&showNav=1&showDate=1&showPrint=0&showTabs=0&showCalendars=0&showTz=0" frameborder="0" scrolling="no"></iframe>
        </div>
        <button class="btn secondary" onclick="showView('home')" style="margin-top:20px; font-size:22px;">다 확인했어요 (메인으로)</button>
    </div>
</div>

<script>
    // ✅ 실제 배포된 API URL로 변경 필수
    const API = "https://script.google.com/macros/s/AKfycbxCDrLBT4TZin5j4avtPIIyl0Ov84VqTm7C3fLLsf_-lal0Oaw2-eTnCM1T_W3LZifN/exec";
    let curStep = 1, selDay = '', selClub = '', selMembers = [];

    // 화면 전환 함수
    function showView(v) {
        document.querySelectorAll('.card').forEach(c => c.classList.add('hidden'));
        document.getElementById('view-' + v).classList.remove('hidden');
        if(v === 'attendance') initDays();
        // 화면 전환 시 맨 위로 스크롤
        window.scrollTo(0, 0);
    }

    // 출석체크 로직 (요일)
    function initDays() {
        showStep(1);
        const days = ['화','수','목','금','토','일'];
        const box = document.getElementById('day-buttons'); box.innerHTML = '';
        days.forEach(d => {
            const b = document.createElement('button'); b.className = 'btn'; b.innerText = d + '요일';
            b.onclick = () => { selDay = d; loadClubs(d); };
            box.appendChild(b);
        });
    }

    // 동아리 불러오기
    async function loadClubs(day) {
        showStep(2);
        const box = document.getElementById('club-buttons'); box.innerHTML = '<p style="text-align:center;">불러오는 중입니다...</p>';
        try {
            const res = await fetch(`${API}?mode=getClubs&day=${day}`);
            const clubs = await res.json();
            box.innerHTML = '';
            if(clubs.length === 0) { box.innerHTML = '<p style="text-align:center;">등록된 동아리가 없습니다.</p>'; return; }
            clubs.forEach(c => {
                const b = document.createElement('button'); b.className = 'btn'; b.innerText = c;
                b.onclick = () => { selClub = c; loadMembers(c); };
                box.appendChild(b);
            });
        } catch (e) { box.innerHTML = '<p style="text-align:center; color:red;">데이터를 못 불러왔습니다.</p>'; }
    }

    // 멤버 불러오기
    async function loadMembers(club) {
        showStep(3);
        document.getElementById('club-title').innerText = club;
        const box = document.getElementById('member-list'); box.innerHTML = '<p style="text-align:center; grid-column: 1 / -1;">명단을 불러오는 중...</p>'; 
        selMembers = [];
        try {
            const res = await fetch(`${API}?mode=getMembers&club=${club}`);
            const members = await res.json();
            box.innerHTML = '';
            if(members.length === 0) { box.innerHTML = '<p style="text-align:center; grid-column: 1 / -1;">등록된 멤버가 없습니다.</p>'; return; }
            members.forEach(m => {
                const b = document.createElement('button'); b.className = 'btn'; b.innerText = m;
                b.onclick = () => {
                    b.classList.toggle('selected');
                    const i = selMembers.indexOf(m);
                    i > -1 ? selMembers.splice(i, 1) : selMembers.push(m);
                };
                box.appendChild(b);
            });
        } catch (e) { box.innerHTML = '<p style="text-align:center; grid-column: 1 / -1; color:red;">명단을 못 불러왔습니다.</p>'; }
    }

    function showStep(s) {
        curStep = s;
        document.getElementById('step-days').classList.toggle('hidden', s!==1);
        document.getElementById('step-clubs').classList.toggle('hidden', s!==2);
        document.getElementById('step-members').classList.toggle('hidden', s!==3);
        window.scrollTo(0, 0);
    }

    function handleBack() {
        if(curStep === 1) showView('home'); else showStep(curStep - 1);
    }

    // 통합 전송 함수
    async function sendPost(mode) {
        const btn = event.target;
        const originalText = btn.innerText;
        
        // 간단한 유효성 검사
        if(mode === 'submitBooking') {
            if(!document.getElementById('b_name').value || !document.getElementById('b_date').value) { alert("이름과 날짜는 꼭 입력해주세요."); return; }
        } else if(mode === 'submitExternal') {
            if(!document.getElementById('e_club').value || !document.getElementById('e_date').value) { alert("동아리명과 날짜는 꼭 입력해주세요."); return; }
        }

        btn.disabled = true;
        btn.innerText = "전송 중...";

        let data = { mode: mode };
        if(mode === 'submitAttendance') {
            data.clubName = selClub; data.attendees = selMembers;
        } else if(mode === 'submitBooking') {
            data.name = document.getElementById('b_name').value;
            data.phone = document.getElementById('b_phone').value;
            data.space = document.getElementById('b_space').value;
            data.content = document.getElementById('b_content').value;
            data.dateTime = document.getElementById('b_date').value;
            data.hours = document.getElementById('b_hours').value;
        } else if(mode === 'submitExternal') {
            data.club = document.getElementById('e_club').value;
            data.phone = document.getElementById('e_phone').value;
            data.event = document.getElementById('e_event').value;
            data.content = document.getElementById('e_content').value;
            data.dateTime = document.getElementById('e_date').value;
        }

        try {
            // mode: "no-cors"로 GitHub Pages에서도 동작하도록 우회
            await fetch(API, { method: "POST", body: JSON.stringify(data), mode: "no-cors" });
            alert("정상적으로 처리되었습니다!");
            location.reload();
        } catch (e) {
            alert("오류가 발생했습니다. 다시 시도해주세요.");
            btn.disabled = false;
            btn.innerText = originalText;
        }
    }

    function submitAttendance() {
        if(!selMembers.length) return alert("출석한 분을 1명 이상 선택하세요.");
        sendPost('submitAttendance');
    }
</script>
</body>
</html>
