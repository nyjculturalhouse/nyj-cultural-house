<script>
const API = "https://script.google.com/macros/s/AKfycbyO4MEH9YOoEgNoeWmfMwuWKiFTbBhcXAbFYub3ktusOmZxe1kng0hlFpKNmWrMV-wRvw/exec";

let selectedDay = '';
let selectedClub = '';
let selectedMembers = [];

function showToast(msg) {
  const t = document.getElementById("toast");
  t.innerText = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2000);
}

function showStep(stepId) {
  document.querySelectorAll('.card').forEach(div => div.classList.add('hidden'));
  document.getElementById(stepId).classList.remove('hidden');

  if(stepId === 'step-days') {
    const days = ['화','수','목','금','토','일'];
    const container = document.getElementById('day-buttons');
    container.innerHTML = '';

    days.forEach(day => {
      const btn = document.createElement('button');
      btn.className = 'btn';
      btn.innerText = day + '요일';

      btn.onclick = () => {
        document.querySelectorAll('#day-buttons .btn').forEach(b=>b.classList.remove('selected'));
        btn.classList.add('selected');

        selectedDay = day;

        fetch(API + "?type=getClubs&day=" + day)
          .then(res => res.json())
          .then(clubs => {
            const c = document.getElementById('club-buttons');
            c.innerHTML='';

            clubs.forEach(club=>{
              const b=document.createElement('button');
              b.className='btn';
              b.innerText=club;
              b.onclick=()=>selectClub(club,b);
              c.appendChild(b);
            });

            showStep('step-clubs');
          });
      };

      container.appendChild(btn);
    });
  }
}

function selectClub(club, btnEl) {
  selectedClub = club;
  selectedMembers = [];

  document.querySelectorAll('#club-buttons .btn').forEach(b=>b.classList.remove('selected'));
  btnEl.classList.add('selected');

  document.getElementById('selected-club-title').innerText = club + ' 출석부';

  fetch(API + "?type=getMembers&club=" + encodeURIComponent(club))
    .then(res => res.json())
    .then(members=>{
      const container=document.getElementById('member-list');
      container.innerHTML='';

      members.forEach(name=>{
        const btn=document.createElement('button');
        btn.className='btn member-btn';
        btn.innerText=name;

        btn.onclick=function(){
          this.classList.toggle('selected');

          const i=selectedMembers.indexOf(name);
          i>-1 ? selectedMembers.splice(i,1) : selectedMembers.push(name);
        };

        container.appendChild(btn);
      });

      showStep('step-members');
    });
}

function submitData() {
  if(selectedMembers.length===0){
    showToast("출석 인원을 선택해주세요");
    return;
  }

  fetch(API, {
    method: "POST",
    body: JSON.stringify({
      type: "attendance",
      club: selectedClub,
      members: selectedMembers,
      day: selectedDay
    })
  }).then(()=>{
    showToast("출석 완료되었습니다");
    showStep('step-home');
  });
}
</script>
