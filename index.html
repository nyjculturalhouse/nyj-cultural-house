<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.3">

<style>
body { font-family:-apple-system,'Noto Sans KR'; background:#f2f4f6; margin:0;}
.container { max-width:600px; margin:auto; padding:24px;}

.card {
  background:white;
  padding:30px;
  border-radius:24px;
  margin-bottom:20px;
  box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

/* 🔥 글씨 크게 */
h2 { text-align:center; font-size:34px; }
h3 { font-size:26px; }

/* 🔥 버튼 크게 */
.btn {
  width:100%;
  padding:26px;
  margin-top:14px;
  border:none;
  border-radius:18px;
  font-size:26px;
  cursor:pointer;
  background:#fff;
}

.primary { background:#3182f6; color:white; font-weight:bold;}
.danger { background:#ff4d4f; color:white;}

.selected {
  background:#3182f6;
  color:white;
  transform:scale(1.05);
}

/* 🔥 입력 크게 */
input, select {
  width:100%;
  padding:20px;
  font-size:22px;
  margin-top:10px;
  border-radius:14px;
  border:1px solid #ddd;
}

.hidden { display:none; }

iframe { width:100%; height:550px; border:none; border-radius:14px;}

/* 🔥 토스트 */
.toast {
  position:fixed; bottom:40px; left:50%;
  transform:translateX(-50%);
  background:#191f28; color:white;
  padding:18px 26px;
  font-size:22px;
  border-radius:14px;
  opacity:0;
  transition:0.3s;
}
.toast.show { opacity:1;}
</style>
</head>

<body>

<div class="container">

<!-- 홈 -->
<div id="view-home" class="card">
<h2>문화의집 시스템</h2>
<button class="btn primary" onclick="showView('attendance')">출석체크</button>
<button class="btn primary" onclick="showView('booking')">대관 신청</button>
<button class="btn primary" onclick="showView('external')">외부활동</button>
<button class="btn primary" onclick="showView('calendar')">캘린더</button>
</div>

<!-- 출석 -->
<div id="view-attendance" class="card hidden">
<div id="step-days"></div>
<div id="step-clubs" class="hidden"></div>
<div id="step-members" class="hidden"></div>
<button class="btn danger" onclick="back()">뒤로가기</button>
</div>

<!-- 대관 -->
<div id="view-booking" class="card hidden">
<h2>대관 신청</h2>
<input id="b_name" placeholder="이름">
<input id="b_phone" placeholder="전화번호">
<input id="b_space" placeholder="장소">
<input id="b_content" placeholder="내용">
<input id="b_date" type="datetime-local">
<select id="b_hours">
<option value="1">1시간</option>
<option value="2">2시간</option>
<option value="3">3시간</option>
</select>
<button class="btn primary" onclick="sendBooking()">신청</button>
</div>

<!-- 외부 -->
<div id="view-external" class="card hidden">
<h2>외부활동</h2>
<input id="e_club" placeholder="동아리">
<input id="e_phone" placeholder="연락처">
<input id="e_event" placeholder="행사명">
<input id="e_content" placeholder="내용">
<input id="e_date" type="datetime-local">
<button class="btn primary" onclick="sendExternal()">등록</button>
</div>

<!-- 캘린더 -->
<div id="view-calendar" class="card hidden">
<iframe src="https://calendar.google.com/calendar/embed?src=nyjculturalhouse%40gmail.com&ctz=Asia%2FSeoul"></iframe>
</div>

</div>

<div id="toast" class="toast"></div>

<script>

const API = "https://script.google.com/macros/s/AKfycbzg8cnqcvWHhAutwqItto9Wucn4dig92Jm8_ZfQgLZ8S2zSunebUlHjrm0aPvTILlBA/exec";

let step=1;
let selDay='', selClub='', selMembers=[];
let clubCache={}, memberCache={};

// ===== 공통 =====
function showToast(msg){
  const t=document.getElementById('toast');
  t.innerText=msg;
  t.classList.add('show');
  if(navigator.vibrate) navigator.vibrate(300);
  setTimeout(()=>t.classList.remove('show'),2000);
}

function showView(v){
  document.querySelectorAll('.card').forEach(c=>c.classList.add('hidden'));
  document.getElementById('view-'+v).classList.remove('hidden');
  if(v==='attendance') loadDays();
}

// ===== iframe 전송 =====
function sendByIframe(url){
  const iframe=document.createElement("iframe");
  iframe.style.display="none";
  iframe.src=url;
  document.body.appendChild(iframe);
  setTimeout(()=>iframe.remove(),2000);
}

// ===== 출석 =====

function loadDays(){
  step=1;
  const box=document.getElementById('step-days');
  box.classList.remove('hidden');
  document.getElementById('step-clubs').classList.add('hidden');
  document.getElementById('step-members').classList.add('hidden');

  box.innerHTML='<h3>요일 선택</h3>';

  ['화요일','수요일','목요일','금요일','토요일','일요일'].forEach(d=>{
    const b=document.createElement('button');
    b.className='btn';
    b.innerText=d;
    b.onclick=()=>{ selDay=d; loadClubs(d); }
    box.appendChild(b);
  });
}

function loadClubs(day){
  step=2;
  document.getElementById('step-days').classList.add('hidden');

  const box=document.getElementById('step-clubs');
  box.classList.remove('hidden');

  // 🔥 캐싱
  if(clubCache[day]){
    renderClubs(clubCache[day]);
    return;
  }

  box.innerHTML='불러오는중...';

  fetch(`${API}?mode=getClubs&day=${encodeURIComponent(day)}`)
  .then(r=>r.json())
  .then(data=>{
    clubCache[day]=data;
    renderClubs(data);
  });
}

function renderClubs(data){
  const box=document.getElementById('step-clubs');
  box.innerHTML='<h3>동아리 선택</h3>';

  data.forEach(c=>{
    const b=document.createElement('button');
    b.className='btn';
    b.innerText=c;
    b.onclick=()=>{
      selClub=c;
      document.querySelectorAll('#step-clubs .btn').forEach(x=>x.classList.remove('selected'));
      b.classList.add('selected');
      loadMembers(c);
    }
    box.appendChild(b);
  });
}

function loadMembers(club){
  step=3;
  document.getElementById('step-clubs').classList.add('hidden');

  const box=document.getElementById('step-members');
  box.classList.remove('hidden');
  selMembers=[];

  if(memberCache[club]){
    renderMembers(club, memberCache[club]);
    return;
  }

  fetch(`${API}?mode=getMembers&club=${encodeURIComponent(club)}`)
  .then(r=>r.json())
  .then(data=>{
    memberCache[club]=data;
    renderMembers(club,data);
  });
}

function renderMembers(club,data){
  const box=document.getElementById('step-members');
  box.innerHTML=`<h3>${club}</h3>`;

  data.forEach(m=>{
    const b=document.createElement('button');
    b.className='btn';
    b.innerText=m;
    b.onclick=()=>{
      b.classList.toggle('selected');
      const i=selMembers.indexOf(m);
      i>-1?selMembers.splice(i,1):selMembers.push(m);
    };
    box.appendChild(b);
  });

  const submit=document.createElement('button');
  submit.className='btn primary';
  submit.innerText='출석 제출';
  submit.onclick=submitAttendance;
  box.appendChild(submit);
}

function submitAttendance(){
  if(!selMembers.length){
    showToast("인원 선택하세요");
    return;
  }

  const url = `${API}?mode=submitAttendance`
    + `&club=${encodeURIComponent(selClub)}`
    + `&members=${encodeURIComponent(JSON.stringify(selMembers))}`;

  sendByIframe(url);

  showToast("출석 완료");
  setTimeout(()=>showView('home'),1200);
}

// ===== 대관 =====
function sendBooking(){
  const url = `${API}?mode=submitBooking`
    + `&name=${b_name.value}`
    + `&phone=${b_phone.value}`
    + `&space=${b_space.value}`
    + `&content=${b_content.value}`
    + `&dateTime=${b_date.value}`
    + `&hours=${b_hours.value}`;

  sendByIframe(url);
  showToast("대관 신청 완료");

  setTimeout(()=>{
    b_name.value=''; b_phone.value=''; b_space.value='';
    b_content.value=''; b_date.value='';
    showView('home');
  },1000);
}

// ===== 외부 =====
function sendExternal(){
  const url = `${API}?mode=submitExternal`
    + `&club=${e_club.value}`
    + `&phone=${e_phone.value}`
    + `&event=${e_event.value}`
    + `&content=${e_content.value}`
    + `&dateTime=${e_date.value}`;

  sendByIframe(url);
  showToast("제출 완료");

  setTimeout(()=>{
    e_club.value=''; e_phone.value='';
    e_event.value=''; e_content.value='';
    e_date.value='';
    showView('home');
  },1000);
}

// ===== 뒤로 =====
function back(){
  if(step===1) showView('home');
  else if(step===2){
    document.getElementById('step-clubs').classList.add('hidden');
    document.getElementById('step-days').classList.remove('hidden');
    step=1;
  } else {
    document.getElementById('step-members').classList.add('hidden');
    document.getElementById('step-clubs').classList.remove('hidden');
    step=2;
  }
}

</script>

</body>
</html>
