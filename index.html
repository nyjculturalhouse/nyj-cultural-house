<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>남양주시 문화의집</title>
    <style>
        :root { --blue: #3182f6; --bg: #f2f4f6; --gray: #f9fafb; --danger: #ff4d4f; }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg); margin: 0; padding: 0; }
        .header { background: var(--blue); color: white; text-align: center; padding: 20px; font-size: 18px; font-weight: bold; position: sticky; top: 0; z-index: 100; }
        .container { max-width: 500px; margin: 15px auto; padding: 0 15px; }
        .card { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 50px; }
        h3 { font-size: 15px; color: #6b7684; text-align: center; margin-bottom: 15px; }
        .btn { width: 100%; padding: 16px; margin-top: 10px; border: none; border-radius: 14px; font-size: 16px; cursor: pointer; transition: 0.2s; background: var(--gray); color: #4e5968; font-weight: 500; }
        .primary { background: var(--blue); color: white; font-weight: bold; }
        .danger { background: var(--danger); color: white; margin-top: 15px; }
        .btn.active { background: var(--blue) !important; color: white !important; }
        .hidden { display: none; }
        .loading { text-align: center; padding: 30px; color: var(--blue); font-weight: bold; }
        input, select { width: 100%; padding: 14px; margin-top: 10px; border-radius: 12px; border: 1px solid #e5e8eb; font-size: 16px; box-sizing: border-box; background: var(--gray); }
        iframe { width: 100%; height: 500px; border: none; border-radius: 15px; margin-top: 10px; }
    </style>
</head>
<body>

<div class="header">남양주시 문화의집</div>

<div class="container">
    <div id="home" class="card">
        <button class="btn primary" onclick="showView('attendance')">동아리 출석체크</button>
        <button class="btn primary" onclick="showView('booking')">대관 신청</button>
        <button class="btn primary" onclick="showView('external')">외부활동 공유</button>
        <button class="btn primary" onclick="showView('calendar')">캘린더 보기</button>
    </div>

    <div id="attendance" class="card hidden">
        <div id="step-days">
            <h3>요일 선택</h3>
            <div id="days-box"></div>
        </div>
        <div id="step-clubs" class="hidden">
            <h3>동아리 선택</h3>
            <div id="clubs-box"></div>
        </div>
        <div id="step-members" class="hidden">
            <h3>명단 선택</h3>
            <div id="members-box"></div>
            <button class="btn primary" style="margin-top:20px;" onclick="submitAttendance()">출석 제출</button>
        </div>
        <button id="att-back" class="btn danger" onclick="handleAttBack()">뒤로가기</button>
    </div>

    <div id="booking" class="card hidden">
        <h3>대관 신청</h3>
        <input id="b_name" placeholder="신청자 성함">
        <input id="b_phone" placeholder="전화번호">
        <input id="b_space" placeholder="이용 공간">
        <input id="b_content" placeholder="사용 목적">
        <input id="b_date" type="datetime-local">
        <select id="b_hours">
            <option value="" disabled selected>이용 시간 선택</option>
            <option value="1">1시간</option><option value="2">2시간</option><option value="3">3시간</option>
        </select>
        <button class="btn primary" onclick="submitBooking()">신청 완료</button>
        <button class="btn danger" onclick="showView('home')">메인으로</button>
    </div>

    <div id="external" class="card hidden">
        <h3>외부활동 공유</h3>
        <input id="e_club" placeholder="동아리명">
        <input id="e_phone" placeholder="연락처">
        <input id="e_event" placeholder="행사/활동명">
        <input id="e_content" placeholder="활동 내용 설명">
        <input id="e_date" type="datetime-local">
        <button class="btn primary" onclick="submitExternal()">등록하기</button>
        <button class="btn danger" onclick="showView('home')">메인으로</button>
    </div>

    <div id="calendar" class="card hidden">
        <iframe src="https://calendar.google.com/calendar/embed?src=nyjculturalhouse%40gmail.com&ctz=Asia%2FSeoul"></iframe>
        <button class="btn danger" onclick="showView('home')">메인으로</button>
    </div>
</div>

<script>
    const API_URL = "여기에_새로_발급받은_배포_URL_입력"; // 반드시 새 배포 URL로 교체하세요.
    let attStep = 1;
    let selectedDay='', selectedClub='', selectedMembers=[];

    function showView(id) {
        document.querySelectorAll('.card').forEach(c => c.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
        if(id === 'attendance') initAttendance();
    }

    // 출석체크 초기화 및 요일 생성
    function initAttendance() {
        showAttStep(1);
        const days = ['화요일','수요일','목요일','금요일','토요일','일요일'];
        const box = document.getElementById('days-box');
        box.innerHTML = '';
        days.forEach(d => {
            const b = document.createElement('button');
            b.className = 'btn';
            b.innerText = d;
            b.onclick = () => loadClubs(d);
            box.appendChild(b);
        });
    }

    // 동아리 목록 로딩 및 화면 전환
    function loadClubs(day) {
        selectedDay = day;
        showAttStep(2);
        const box = document.getElementById('clubs-box');
        box.innerHTML = '<div class="loading">동아리 목록 로딩 중...</div>';
        fetch(`${API_URL}?type=getClubs&day=${encodeURIComponent(day)}`)
            .then(r => r.json())
            .then(data => {
                box.innerHTML = '';
                if(data.length === 0) box.innerHTML = '<p style="text-align:center">해당 요일에 등록된 동아리가 없습니다.</p>';
                data.forEach(club => {
                    const b = document.createElement('button');
                    b.className = 'btn';
                    b.innerText = club;
                    b.onclick = () => loadMembers(club);
                    box.appendChild(b);
                });
            }).catch(() => { box.innerHTML = '<p style="text-align:center; color:red;">데이터를 가져오지 못했습니다.</p>'; });
    }

    // 명단 로딩 및 화면 전환
    function loadMembers(club) {
        selectedClub = club;
        selectedMembers = [];
        showAttStep(3);
        const box = document.getElementById('members-box');
        box.innerHTML = '<div class="loading">명단 로딩 중...</div>';
        fetch(`${API_URL}?type=getMembers&club=${encodeURIComponent(club)}`)
            .then(r => r.json())
            .then(data => {
                box.innerHTML = '';
                data.forEach(m => {
                    const b = document.createElement('button');
                    b.className = 'btn';
                    b.innerText = m;
                    b.onclick = () => {
                        b.classList.toggle('active');
                        const i = selectedMembers.indexOf(m);
                        i > -1 ? selectedMembers.splice(i, 1) : selectedMembers.push(m);
                    };
                    box.appendChild(b);
                });
            });
    }

    function showAttStep(step) {
        attStep = step;
        document.getElementById('step-days').classList.toggle('hidden', step !== 1);
        document.getElementById('step-clubs').classList.toggle('hidden', step !== 2);
        document.getElementById('step-members').classList.toggle('hidden', step !== 3);
    }

    function handleAttBack() {
        if(attStep === 1) showView('home');
        else showAttStep(attStep - 1);
    }

    // 제출 로직 (기존 유지)
    function submitAttendance() {
        if(selectedMembers.length === 0) return alert("출석 인원을 선택하세요.");
        fetch(API_URL, { method: "POST", body: JSON.stringify({ type: "attendance", club: selectedClub, members: selectedMembers, day: selectedDay }) })
        .then(() => { alert("출석 완료!"); showView('home'); });
    }

    function submitBooking() {
        const data = { type: "booking", name: document.getElementById('b_name').value, phone: document.getElementById('b_phone').value, space: document.getElementById('b_space').value, content: document.getElementById('b_content').value, dateTime: document.getElementById('b_date').value, hours: document.getElementById('b_hours').value };
        fetch(API_URL, { method: "POST", body: JSON.stringify(data) }).then(() => { alert("대관 신청 완료!"); showView('home'); });
    }

    function submitExternal() {
        const data = { type: "external", club: document.getElementById('e_club').value, phone: document.getElementById('e_phone').value, event: document.getElementById('e_event').value, content: document.getElementById('e_content').value, dateTime: document.getElementById('e_date').value };
        fetch(API_URL, { method: "POST", body: JSON.stringify(data) }).then(() => { alert("외부활동 등록 완료!"); showView('home'); });
    }
</script>
</body>
</html>
