<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <style>
    body { font-family: 'Malgun Gothic', sans-serif; background-color: #f5f7fa; margin: 0; padding: 0; }
    .nav-bar { background-color: #2b67d9; color: white; padding: 20px; text-align: center; font-weight: bold; font-size: 1.2rem; }
    .container { padding: 20px; max-width: 500px; margin: auto; }
    .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
    
    label { font-weight: bold; display: block; margin-bottom: 10px; color: #333; }
    
    /* 요일 버튼 */
    .day-flex { display: flex; gap: 5px; margin-bottom: 15px; }
    .day-btn { flex: 1; padding: 10px 0; border: 1px solid #ddd; border-radius: 8px; background: white; cursor: pointer; font-weight: bold; }
    .day-btn.active { background-color: #2b67d9; color: white; border-color: #2b67d9; }

    select { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ddd; font-size: 1rem; margin-bottom: 15px; }

    /* 이름 버튼 */
    .name-grid { display: flex; flex-wrap: wrap; gap: 8px; }
    .name-item { padding: 8px 15px; background: #eee; border-radius: 20px; cursor: pointer; font-size: 0.9rem; border: 1px solid #ccc; }
    .name-item.selected { background: #2b67d9; color: white; border-color: #2b67d9; }

    .btn-main { width: 100%; padding: 15px; border: none; border-radius: 8px; font-weight: bold; font-size: 1rem; cursor: pointer; margin-top: 10px; }
    .btn-submit { background-color: #2b67d9; color: white; }
    .btn-back { background-color: #6c757d; color: white; margin-top: 10px; }
    
    .loading { text-align: center; color: #888; font-size: 0.9rem; padding: 10px; }
  </style>
</head>
<body>

<div class="nav-bar">남양주시 문화의집</div>

<div class="container">
  <div class="card">
    <label>1. 요일 선택</label>
    <div class="day-flex">
      <button class="day-btn" onclick="clickDay(this, '월')">월</button>
      <button class="day-btn" onclick="clickDay(this, '화')">화</button>
      <button class="day-btn" onclick="clickDay(this, '수')">수</button>
      <button class="day-btn" onclick="clickDay(this, '목')">목</button>
      <button class="day-btn" onclick="clickDay(this, '금')">금</button>
    </div>

    <label>2. 동아리명 선택</label>
    <select id="clubSelect" onchange="loadMembers()">
      <option value="">요일을 먼저 선택하세요</option>
    </select>

    <label>3. 출석 인원 선택</label>
    <div id="memberList" class="name-grid">
      <div class="loading">동아리를 선택해 주세요.</div>
    </div>
  </div>

  <button id="submitBtn" class="btn-main btn-submit" onclick="submit()" disabled>출석 제출</button>
  <button class="btn-main btn-back" onclick="location.reload()">새로고침</button>
</div>

<script>
  let currentDay = "";
  let selectedNames = [];

  function clickDay(btn, day) {
    document.querySelectorAll('.day-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentDay = day;
    
    const select = document.getElementById('clubSelect');
    select.innerHTML = '<option>로딩 중...</option>';
    
    google.script.run.withSuccessHandler(clubs => {
      select.innerHTML = '<option value="">동아리를 선택하세요</option>';
      clubs.forEach(c => {
        const opt = document.createElement('option');
        opt.value = opt.text = c;
        select.appendChild(opt);
      });
    }).getClubsByDay(day);
  }

  function loadMembers() {
    const club = document.getElementById('clubSelect').value;
    const listDiv = document.getElementById('memberList');
    if(!club) return;
    
    listDiv.innerHTML = '<div class="loading">명단을 불러오는 중...</div>';
    selectedNames = [];
    updateBtnState();

    google.script.run.withSuccessHandler(members => {
      listDiv.innerHTML = "";
      members.forEach(m => {
        const div = document.createElement('div');
        div.className = 'name-item';
        div.textContent = m;
        div.onclick = function() {
          this.classList.toggle('selected');
          const idx = selectedNames.indexOf(m);
          if(idx > -1) selectedNames.splice(idx, 1);
          else selectedNames.push(m);
          updateBtnState();
        };
        listDiv.appendChild(div);
      });
    }).getMembers(club);
  }

  function updateBtnState() {
    document.getElementById('submitBtn').disabled = selectedNames.length === 0;
  }

  function submit() {
    const club = document.getElementById('clubSelect').value;
    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.textContent = "제출 중...";

    google.script.run.withSuccessHandler(res => {
      alert(res);
      location.reload();
    }).saveAttendance(club, selectedNames, currentDay);
  }
</script>

</body>
</html>
