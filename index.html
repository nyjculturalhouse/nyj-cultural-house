<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@latest/dist/web/static/pretendard.css">

<style>
body {
  font-family: 'Pretendard', sans-serif;
  margin: 0;
  background: #f5f6f8;
}

.header {
  text-align:center;
  padding:15px;
  background:#2d6cdf;
  color:white;
  font-weight:600;
}

.page { display:none; padding:15px; }
.active { display:block; }

button {
  width:100%;
  padding:14px;
  margin:6px 0;
  border:none;
  border-radius:10px;
  background:#2d6cdf;
  color:white;
}

.back { background:#777; }

input, textarea, select {
  width:100%;
  padding:10px;
  margin:6px 0;
  border:1px solid #ddd;
  border-radius:8px;
}
</style>
</head>

<body>

<div class="header">남양주시 문화의집</div>

<!-- 홈 -->
<div id="home" class="page active">
  <button onclick="go('attendance')">동아리 출석체크</button>
  <button onclick="go('booking')">대관신청</button>
  <button onclick="go('external')">외부활동공유</button>
  <button onclick="go('calendar')">캘린더</button>
</div>

<!-- 출석 -->
<div id="attendance" class="page">
  <h3>동아리 선택</h3>
  <div id="clubList">로딩중...</div>

  <h3>이름 선택</h3>
  <div id="memberList"></div>

  <button onclick="submitAttendance()">출석 제출</button>
  <button class="back" onclick="go('home')">뒤로가기</button>
</div>

<!-- 대관 -->
<div id="booking" class="page">
  <h3>대관신청</h3>

  <input id="b_name" placeholder="이름">
  <input id="b_phone" placeholder="전화번호">
  <input id="b_space" placeholder="공간">
  <textarea id="b_content" placeholder="내용"></textarea>
  <input id="b_datetime" type="datetime-local">

  <select id="b_hours">
    <option value="1">1시간</option>
    <option value="2">2시간</option>
    <option value="3">3시간</option>
    <option value="4">4시간</option>
  </select>

  <button onclick="submitBooking()">제출</button>
  <button class="back" onclick="go('home')">뒤로가기</button>
</div>

<!-- 외부활동 -->
<div id="external" class="page">
  <h3>외부활동</h3>

  <input id="e_club" placeholder="동아리명">
  <input id="e_phone" placeholder="전화번호">
  <input id="e_event" placeholder="행사명">
  <textarea id="e_content" placeholder="내용"></textarea>
  <input id="e_datetime" type="datetime-local">

  <button onclick="submitExternal()">제출</button>
  <button class="back" onclick="go('home')">뒤로가기</button>
</div>

<!-- 캘린더 -->
<div id="calendar" class="page">
  <iframe src="https://calendar.google.com/calendar/embed?src=nyjculturalhouse%40gmail.com&ctz=Asia%2FSeoul"
    style="width:100%; height:500px; border:0;"></iframe>

  <button class="back" onclick="go('home')">뒤로가기</button>
</div>

<script>

const API = "https://script.google.com/macros/s/AKfycbyO4MEH9YOoEgNoeWmfMwuWKiFTbBhcXAbFYub3ktusOmZxe1kng0hlFpKNmWrMV-wRvw/exec";

let selectedClub = "";
let selectedMember = "";

/* 페이지 이동 */
function go(page){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById(page).classList.add('active');

  if(page === "attendance"){
    loadClubs();
  }
}

/* 동아리 */
function loadClubs(){
  fetch(API + "?type=getClubs")
    .then(res=>res.json())
    .then(data=>{
      let html="";
      data.forEach(c=>{
        html += `<button onclick="selectClub('${c}')">${c}</button>`;
      });
      document.getElementById("clubList").innerHTML = html;
    });
}

/* 이름 */
function selectClub(club){
  selectedClub = club;

  fetch(API + "?type=getMembers&club="+encodeURIComponent(club))
    .then(res=>res.json())
    .then(data=>{
      let html="";
      data.forEach(m=>{
        html += `<button onclick="selectMember('${m}')">${m}</button>`;
      });
      document.getElementById("memberList").innerHTML = html;
    });
}

function selectMember(name){
  selectedMember = name;
}

/* 출석 */
function submitAttendance(){
  fetch(API, {
    method:"POST",
    body:JSON.stringify({
      type:"attendance",
      club:selectedClub,
      member:selectedMember,
      day:new Date().toLocaleDateString()
    })
  }).then(()=>{
    alert("출석 완료");
    go('home');
  });
}

/* 대관 */
function submitBooking(){
  fetch(API,{
    method:"POST",
    body:JSON.stringify({
      type:"booking",
      name:b_name.value,
      phone:b_phone.value,
      space:b_space.value,
      content:b_content.value,
      dateTime:b_datetime.value,
      hours:b_hours.value
    })
  }).then(()=>{
    alert("대관 완료");
    go('home');
  });
}

/* 외부활동 */
function submitExternal(){
  fetch(API,{
    method:"POST",
    body:JSON.stringify({
      type:"external",
      club:e_club.value,
      phone:e_phone.value,
      event:e_event.value,
      content:e_content.value,
      dateTime:e_datetime.value
    })
  }).then(()=>{
    alert("등록 완료");
    go('home');
  });
}

</script>

</body>
</html>
