<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

<h2>남양주시 문화의집</h2>

<h3>출석 테스트</h3>

<input id="club" placeholder="동아리명">
<textarea id="members" placeholder="출석자 (쉼표로 구분)"></textarea>

<button onclick="sendAttendance()">출석 저장</button>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbyO4MEH9YOoEgNoeWmfMwuWKiFTbBhcXAbFYub3ktusOmZxe1kng0hlFpKNmWrMV-wRvw/exec";

function sendAttendance(){
  fetch(API_URL, {
    method: "POST",
    body: JSON.stringify({
      type: "attendance",
      club: document.getElementById("club").value,
      members: document.getElementById("members").value
    })
  })
  .then(res => res.json())
  .then(res => {
    if(res.error){
      alert("오류: " + res.error);
    } else {
      alert("출석 완료!");
    }
  })
  .catch(err => {
    alert("연결 실패");
    console.log(err);
  });
}
</script>

</body>
</html>
